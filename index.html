async function sbFetch(path, options = {}) {
  const token = localStorage.getItem("jl_token");
  const headers = {
    "apikey": SUPABASE_KEY,
    "Content-Type": "application/json",
    "Authorization": "Bearer " + (token || SUPABASE_KEY),
    ...(options.headers || {})
  };
  const res = await fetch(SUPABASE_URL + path, { ...options, headers });
  const d = await res.json().catch(() => ({}));
  return { data: d, ok: res.ok, status: res.status };
}

async function sbSignIn(email, password) {
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  return res.json();
}

async function sbSignOut() {
  const token = localStorage.getItem("jl_token");
  await fetch(SUPABASE_URL + "/auth/v1/logout", {
    method: "POST", headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + token }
  });
  localStorage.removeItem("jl_token");
  localStorage.removeItem("jl_user_id");
  localStorage.removeItem("jl_owner");
}

async function sbGetOwner(userId) {
  const { data } = await sbFetch("/rest/v1/owners?id=eq." + userId + "&select=*");
  return Array.isArray(data) && data.length > 0 ? data[0] : null;
}

async function sbGetTrades() {
  const { data } = await sbFetch("/rest/v1/trades?select=*&order=created_at.desc");
  return Array.isArray(data) ? data : [];
}

async function sbInsertTrade(trade) {
  return sbFetch("/rest/v1/trades", {
    method: "POST", headers: { "Prefer": "return=representation" },
    body: JSON.stringify(trade)
  });
}

async function sbUpdateTrade(id, updates) {
  return sbFetch("/rest/v1/trades?id=eq." + id, {
    method: "PATCH", headers: { "Prefer": "return=representation" },
    body: JSON.stringify(updates)
  });
}

}

async function sbDeleteObservation(id) {

async function sbGetKyrieVotes(season = 3) {
  const { data } = await sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&select=*");
  return Array.isArray(data) ? data : [];
}

async function sbUpsertKyrieVote(season, voter_team, rank1, rank2, rank3) {
  const existing = await sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&voter_team=eq." + voter_team);
  if (existing.data && existing.data.length > 0) {
    return sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&voter_team=eq." + voter_team, {
      method: "PATCH", headers: { "Prefer": "return=representation" },
      body: JSON.stringify({ rank1, rank2, rank3, submitted_at: new Date().toISOString() })
    });
  }
  return sbFetch("/rest/v1/kyrie_votes", {
    method: "POST", headers: { "Prefer": "return=representation" },
    body: JSON.stringify({ season, voter_team, rank1, rank2, rank3 })
  });
}

  });
}

function applyRosterOverrides(overrides) {
  const teamRosters = {};
  TEAMS.forEach(t => { teamRosters[t.id] = [...t.roster]; });
  overrides.forEach(o => {
    if (o.from_team !== "FA" && teamRosters[o.from_team]) {
      teamRosters[o.from_team] = teamRosters[o.from_team].filter(p => p !== o.player);
    }
    if (o.to_team !== "FA" && teamRosters[o.to_team]) {
      if (!teamRosters[o.to_team].includes(o.player)) {
        teamRosters[o.to_team] = [...teamRosters[o.to_team], o.player];
      }
    }
  });
  return TEAMS.map(t => ({ ...t, roster: teamRosters[t.id] || t.roster }));
}

function applyAwardOverrides(overrides) {
  return AWARDS.map(a => {
    const override = overrides.find(o => o.player === a.player && o.from_team === a.team);
    if (override) return { ...a, team: override.to_team };
    return a;
  });
}

function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setLoading(true); setError("");
    const d = await sbSignIn(email, password);
    if (!d.access_token) { setError("Invalid email or password."); setLoading(false); return; }
    localStorage.setItem("jl_token", d.access_token);
    localStorage.setItem("jl_user_id", d.user.id);
    const owner = await sbGetOwner(d.user.id);
    if (!owner) { setError("Account not linked. Contact Jake."); setLoading(false); return; }
    localStorage.setItem("jl_owner", JSON.stringify(owner));
    onLogin(owner); setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#000", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "Inter, sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 40 }}>
          <div id="login-logo" style={{ width: 80, height: 80, marginBottom: 16 }} />
          <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", letterSpacing: -1 }}>Jones League</div>
          <div style={{ fontSize: 12, color: "#666", letterSpacing: 2, textTransform: "uppercase", marginTop: 4 }}>Dynasty Fantasy Basketball</div>
        </div>
        <div style={{ background: "#111", borderRadius: 16, padding: 32, border: "1px solid #222" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 24 }}>Sign in to your team</div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 8 }}>Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="your@email.com"
              style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 8, padding: "12px 14px", fontSize: 16, color: "#fff", outline: "none", fontFamily: "inherit", boxSizing: "border-box" }} />
          </div>
          <div style={{ marginBottom: 24 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 8 }}>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="..."
              style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 8, padding: "12px 14px", fontSize: 16, color: "#fff", outline: "none", fontFamily: "inherit", boxSizing: "border-box" }} />
          </div>
          {error && <div style={{ background: "#2a0a0a", border: "1px solid #5a1a1a", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#f87171", marginBottom: 16 }}>{error}</div>}
          <button onClick={handleLogin} disabled={loading || !email || !password}
            style={{ width: "100%", background: loading ? "#333" : "#C8102E", color: "#fff", border: "none", borderRadius: 8, padding: 14, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {loading ? "Signing in..." : "Sign In"}
          </button>
        </div>
        <div style={{ textAlign: "center", marginTop: 20, fontSize: 12, color: "#444" }}>Forgot your password? Contact Jake (commissioner)</div>
      </div>
    </div>
  );
}


function useIsMobile() {
  const [mob, setMob] = useState(typeof window !== "undefined" ? window.innerWidth < 640 : false);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth < 640);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

function calcTeamScores(awards) {
  const s = {}; TEAMS.forEach(t => s[t.id] = 0);
  const twoWaySet = {};
  TEAMS.forEach(t => t.twoWay.forEach(p => twoWaySet[p] = t.id));
  const coachTeam = {}; TEAMS.forEach(t => coachTeam[t.coach] = t.id);
  awards.forEach(a => {
    let teamId = a.team;
    if (!teamId && a.award === "COY" && coachTeam[a.player]) teamId = coachTeam[a.player];
    if (teamId && s[teamId] !== undefined && a.pts > 0) {
      const mult = twoWaySet[a.player] === teamId ? 0.5 : 1;
      s[teamId] += a.pts * mult;
    }
  });
  return s;
}

  const m = {

    MOST_IMPROVED:"Most Improved", DPOY:"DPOY Voting", IN_SEASON_TOURNEY_MVP:"In-Season MVP",
    COY:"COY Voting", CLUTCH:"Clutch Player", SCORING_TITLE:"Scoring Title",
    SIXTH_MAN:"Sixth Man", PLAYOFF_SUCCESS:"Playoff Run", ALL_ROOKIE:"All-Rookie",
    DUNK_CONTEST:"Dunk Contest", THREE_PT_CONTEST:"3PT Contest", ALL_DEFENSE:"All-Defense",
    STAT_LEADERS:"Stat Leader", COACH_PLAYOFF:"Coach Playoff", NBA2K:"NBA 2K Sim",
    KYRIE:"Top 3 Kyrie's",
  };
  return m[a] || a;
}

function PlayerScoresPage() {
  const twoWaySet = {};
  TEAMS.forEach(t => t.twoWay.forEach(p => twoWaySet[p] = t.id));
  const coachTeam = {}; TEAMS.forEach(t => coachTeam[t.coach] = t.id);

  const playerScores = {};
  AWARDS.forEach(a => {
    if (!a.team || a.pts === 0) return;
    const isTW = twoWaySet[a.player] === a.team;
    const scored = isTW ? a.pts * 0.5 : a.pts;
    if (!playerScores[a.player]) playerScores[a.player] = { player: a.player, team: a.team, total: 0, fullTotal: 0, isTwoWay: isTW, isCoach: false, awards: [] };
    playerScores[a.player].total += scored;
    playerScores[a.player].fullTotal += a.pts;
    playerScores[a.player].awards.push({ label: awardLabel(a.award), place: a.place, pts: a.pts, scored });
  });

  AWARDS.forEach(a => {
    if ((a.award !== "COY" && a.award !== "COACH_PLAYOFF") || a.pts === 0) return;
    const teamId = a.team || coachTeam[a.player];
    if (!teamId) return;
    const key = "coach:" + a.player;
    if (!playerScores[key]) playerScores[key] = { player: a.player, team: teamId, total: 0, fullTotal: 0, isTwoWay: false, isCoach: true, awards: [] };
    playerScores[key].total += a.pts;
    playerScores[key].fullTotal += a.pts;
    playerScores[key].awards.push({ label: awardLabel(a.award), place: a.place, pts: a.pts, scored: a.pts });
  });

  const maxPts = Math.max(...Object.values(playerScores).map(p => p.total), 1);

            .map(name => playerScores[name] || { player: name, team: team.id, total: 0, fullTotal: 0, isTwoWay: team.twoWay.includes(name), isCoach: false, awards: [] })

                            </span>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })}
      </div>
      <p style={{ fontSize: 12, color: C.g5, marginTop: 16, textAlign: "center" }}>* 2-way players earn half points   Playoff points added when series conclude</p>
    </PageShell>
  );
}


function RostersPage({ draftPicks, draftTrades, initialTeam = "jake", owner, liveTeams, liveAwards }) {
  const teams = liveTeams || TEAMS;
  const awards = liveAwards || AWARDS;
  const [selected, setSelected] = useState("jake");
  const team = getTeam(selected);

  const buildPicksForTeam = (teamObj) => {
    if (!draftPicks) return null;
    const r1 = draftPicks.map((t, i) => ({ round: 1, slot: i + 1, originalOwner: t, currentOwner: t }));
    const r2 = [...draftPicks].reverse().map((t, i) => ({ round: 2, slot: i + 1, originalOwner: t, currentOwner: t }));
    let allPicks = [...r1, ...r2];
    (draftTrades || []).forEach(tr => {
      allPicks = allPicks.map(p => {
        const key = "R" + p.round + "-" + p.slot;
        if (key === tr.pick && p.currentOwner.name === tr.from) {
          const toTeam = TEAMS.find(t => t.name === tr.to);
          return { ...p, currentOwner: toTeam, traded: true, tradeNote: tr.note };
        }
        return p;
      });
    });
    return allPicks.filter(p => p.currentOwner.id === teamObj.id);
  };
  const teamPicks = buildPicksForTeam(team);

  const coachAwards = awards.filter(a => a.player === team.coach && (a.award === "COY" || a.award === "COACH_PLAYOFF") && a.pts > 0);
  const coachPts = coachAwards.reduce((s, a) => s + a.pts, 0);
  const playoffEntry = AWARDS.find(a => a.player === team.coach && a.award === "COACH_PLAYOFF");
  const coyEntry = AWARDS.find(a => a.player === team.coach && a.award === "COY" && a.pts > 0);

  return (
    <PageShell title="Rosters" subtitle="Season 3   2025-26">
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {TEAMS.map(t => <button key={t.id} onClick={() => setSelected(t.id)} style={PILL(selected === t.id, t.color)}>{t.name}</button>)}
      </div>

      <div style={CARD}>
        <div style={{ background: team.color, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 800, fontSize: 18, color: "#fff" }}>Team {team.name}</span>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", fontWeight: 600 }}>HC: {team.coach}   {team.roster.length} PLAYERS</span>
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ ...TH, width: 48 }}>#</th>
              <th style={TH}>PLAYER</th>
              <th style={{ ...TH, width: 80 }}>CONTRACT</th>
              <th style={{ ...TH, width: 80, textAlign: "right", paddingRight: 20 }}>FULL PTS</th>
              <th style={{ ...TH, width: 100, textAlign: "right", paddingRight: 20 }}>SCORED PTS</th>
            </tr>
          </thead>
          <tbody>
            <tr style={{ background: team.color + "08" }}>
              <td style={{ ...TD(0), textAlign: "center", fontWeight: 700, color: C.g3, fontSize: 13 }}>HC</td>
              <td style={{ ...TD(0), fontWeight: 700 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <TeamLogo nbaTeam={COACH_TEAM[team.coach]} size={32} />
                  <div>
                    {team.coach}
                    <span style={{ marginLeft: 8, fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 10, background: "#eff6ff", color: "#1d4ed8", border: "1px solid #bfdbfe" }}>HEAD COACH</span>
                  </div>
                </div>
              </td>
              <td style={TD(0)}>
                <div>
                  {playoffEntry && <div style={{ fontSize: 10, color: C.g5 }}>Playoffs: {playoffEntry.place}</div>}
                  {coyEntry && <div style={{ fontSize: 10, color: C.g5 }}>COY: {coyEntry.place}</div>}
                  {!playoffEntry && !coyEntry && <span style={{ fontSize: 10, color: C.g3 }}>Coach</span>}
                </div>
              </td>
              <td style={{ ...TD(0), textAlign: "right", paddingRight: 20 }}>
                {coachPts > 0 ? <span style={{ color: team.color, fontWeight: 600, fontSize: 13 }}>{coachPts}</span> : <span style={{ color: C.g3 }}>-</span>}
              </td>
              <td style={{ ...TD(0), textAlign: "right", paddingRight: 20 }}>
                {coachPts > 0
                  ? <span style={{ background: team.color + "15", color: team.color, fontWeight: 700, fontSize: 13, padding: "3px 10px", borderRadius: 12, border: "1px solid " + team.color + "30" }}>{coachPts} pts</span>
                  : <span style={{ color: C.g3, fontSize: 13 }}>-</span>}
              </td>
            </tr>
            {team.roster.map((player, i) => {
              const isTwoWay = team.twoWay.includes(player);
              const fullPts = AWARDS.filter(a => a.player === player && a.team === team.id).reduce((sum, a) => sum + a.pts, 0);
              const scoredPts = isTwoWay ? fullPts * 0.5 : fullPts;
              return (
                <tr key={player}>
                  <td style={{ ...TD(i), textAlign: "center", fontWeight: 700, color: C.g3, fontSize: 13 }}>{i + 1}</td>
                  <td style={{ ...TD(i), fontWeight: fullPts > 0 ? 600 : 400 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <TeamLogo nbaTeam={PLAYER_TEAM[player]} size={28} />
                      <span>{player}</span>
                    </div>
                  </td>
                  <td style={TD(i)}>
                    {isTwoWay
                      ? <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.5, padding: "2px 8px", borderRadius: 10, background: "#fff7ed", color: "#c2410c", border: "1px solid #fed7aa" }}>2-WAY</span>
                      : <span style={{ fontSize: 10, color: C.g3 }}>Standard</span>}
                  </td>
                  <td style={{ ...TD(i), textAlign: "right", paddingRight: 20 }}>
                    {fullPts > 0
                      ? <span style={{ color: isTwoWay ? C.g5 : team.color, fontWeight: 600, fontSize: 13, textDecoration: isTwoWay ? "line-through" : "none" }}>{fullPts}</span>
                      : <span style={{ color: C.g3 }}>-</span>}
                  </td>
                  <td style={{ ...TD(i), textAlign: "right", paddingRight: 20 }}>
                    {scoredPts > 0
                      ? <span style={{ background: team.color + "15", color: team.color, fontWeight: 700, fontSize: 13, padding: "3px 10px", borderRadius: 12, border: "1px solid " + team.color + "30" }}>
                          {scoredPts % 1 === 0 ? scoredPts : scoredPts.toFixed(1)} pts
                        </span>
                      : <span style={{ color: C.g3, fontSize: 13 }}>-</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* 2K Section */}
      {(() => {
        const sim2k = AWARDS.find(a => a.award === "NBA2K" && a.team === team.id);
        return (
          <div style={{ marginTop: 20, ...CARD }}>
            <div style={{ background: "#1a1a2e", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: 700, fontSize: 13, color: "#fff", letterSpacing: 1, textTransform: "uppercase" }}>  NBA 2K Simulator</span>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Champion +2 pts   Runner Up +1 pt</span>
            </div>
            <div style={{ padding: "18px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              {sim2k
                ? <><div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 24 }}>{sim2k.place === "Champion" ? " " : " "}</span>
                    <div><div style={{ fontWeight: 700, fontSize: 15 }}>{sim2k.place}</div><div style={{ fontSize: 12, color: C.g5 }}>2025-26 NBA 2K Tournament</div></div>
                  </div>
                  <span style={{ background: team.color + "15", color: team.color, fontWeight: 800, fontSize: 20, padding: "6px 16px", borderRadius: 12, border: "1px solid " + team.color + "30" }}>+{sim2k.pts} pts</span></>
                : <div style={{ color: C.g5, fontSize: 13, fontStyle: "italic" }}>No 2K result for this team.</div>}
            </div>
          </div>
        );
      })()}

      {/* Draft Picks */}
      <div style={{ marginTop: 20, ...CARD }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, fontSize: 13, color: "#fff", letterSpacing: 1, textTransform: "uppercase" }}>  Draft Picks & Swaps</span>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Jones League   All Years</span>
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ ...TH, width: 100 }}>YEAR</th>
              <th style={TH}>1ST ROUND</th>
              <th style={TH}>2ND ROUND</th>
            </tr>
          </thead>
          <tbody>
            {(DRAFT_HISTORY[team.id] || []).map((row, i) => {
              const isCurrentYear = row.year === 3;
              const liveR1 = isCurrentYear && teamPicks?.find(p => p.round === 1);
              const liveR2 = isCurrentYear && teamPicks?.find(p => p.round === 2);
              const r1Display = isCurrentYear && liveR1 ? (liveR1.traded ? "Traded   " + liveR1.currentOwner.name : "Pick " + liveR1.slot) : row.r1;
              const r2Display = isCurrentYear && liveR2 ? (liveR2.traded ? "Traded   " + liveR2.currentOwner.name : "Pick " + liveR2.slot) : row.r2;
              return (
                <tr key={row.year}>
                  <td style={{ ...TD(i), fontWeight: 700, color: isCurrentYear ? team.color : C.g7 }}>
                    Year {row.year}
                    {isCurrentYear && <span style={{ marginLeft: 6, fontSize: 9, background: C.red, color: "#fff", padding: "1px 5px", borderRadius: 3, fontWeight: 700, verticalAlign: "middle" }}>NOW</span>}
                  </td>
                  <td style={TD(i)}>
                    {row.r1 === "Own" && !liveR1
                      ? <span style={{ color: C.g5, fontSize: 13 }}>Own</span>
                      : <span style={{ fontSize: 13, fontWeight: 600 }}>{r1Display}</span>}
                  </td>
                  <td style={TD(i)}>
                    {row.r2 === "Own" && !liveR2
                      ? <span style={{ color: C.g5, fontSize: 13 }}>Own</span>
                      : <span style={{ fontSize: 13, fontWeight: 600 }}>{r2Display}</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </PageShell>
  );
}

function FreeAgentsPage({ owner, liveTeams, onRosterChange }) {
  const teamsLive = liveTeams || TEAMS;
  const allRostered = new Set(teamsLive.flatMap(t => t.roster));
  const [adding, setAdding] = useState(null);
  const [actionMsg, setActionMsg] = useState("");

  const handleAdd = async (playerName) => {
    setAdding(playerName);
    await sbInsertRosterOverride({ player: playerName, from_team: "FA", to_team: owner.team_id, season: 3, trade_id: null });
    setActionMsg(playerName + " added to your roster!");
    setAdding(null);
    if (onRosterChange) onRosterChange();
    setTimeout(() => setActionMsg(""), 4000);
  };
  const [sortKey, setSortKey] = useState("pts");
  const [sortDir, setSortDir] = useState("desc");
  const [search, setSearch] = useState("");
  const [posFilter, setPosFilter] = useState("ALL");
  const players = FA_PLAYERS.filter(p => !allRostered.has(p.name));
  const positions = ["ALL","PG","SG","SF","PF","C"];
  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === "desc" ? "asc" : "desc");
    else { setSortKey(key); setSortDir("desc"); }
  };
  const filtered = players
    .filter(p => posFilter === "ALL" || p.pos === posFilter)
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || (p.team||"").toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      const va = a[sortKey] ?? -999, vb = b[sortKey] ?? -999;
      return sortDir === "desc" ? vb - va : va - vb;
    });
  const arrow = (key) => sortKey === key ? (sortDir === "desc" ? "  " : "  ") : "";

  return (
    <PageShell title="Free Agents" subtitle={"2025-26   " + filtered.length + " available players   Click column to sort"}>
      <div style={{ display: "flex", gap: 10, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
        <input placeholder="Search player or team " value={search} onChange={e => setSearch(e.target.value)}
          style={{ border: "1.5px solid #D0D0D0", padding: "8px 14px", borderRadius: 6, fontSize: 14, fontFamily: "inherit", width: 220, outline: "none" }} />
        <div style={{ display: "flex", gap: 6 }}>
          {positions.map(pos => (
            <button key={pos} onClick={() => setPosFilter(pos)} style={PILL(posFilter === pos)}>{pos}</button>
          ))}
        </div>
        <span style={{ fontSize: 13, color: C.g5 }}>{filtered.length} players</span>
      </div>
      <div style={CARD}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 1200 }}>
            <thead>
              <tr>
                <th style={{ ...TH, position: "sticky", left: 0, background: "#F5F5F5", zIndex: 2, minWidth: 190 }}>PLAYER</th>
                <th style={{ ...TH, width: 48 }}>TEAM</th>
                <th style={{ ...TH, width: 40 }}>POS</th>
                <th style={{ ...TH, width: 44, textAlign: "center" }}>GP</th>
                {STAT_COLS.map(col => (
                  <th key={col.key} title={col.title} onClick={() => handleSort(col.key)} style={{
                    ...TH, cursor: "pointer", userSelect: "none", textAlign: "right",
                    paddingRight: 12, minWidth: 58,
                    background: sortKey === col.key ? "#dce7f8" : "#F5F5F5",
                    color: sortKey === col.key ? C.blue : C.g5, whiteSpace: "nowrap",
                  }}>{col.label}{arrow(col.key)}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((p, i) => (
                <tr key={p.name}>
                  <td style={{ ...TD(i), position: "sticky", left: 0, zIndex: 1, fontWeight: 600, minWidth: 190, background: i % 2 === 0 ? "#fff" : "#F5F5F5" }}>
                    {p.name}
                    {p.fantPts > 0 && <span style={{ marginLeft: 7, fontSize: 10, background: "#fef3c7", color: "#92400e", padding: "2px 6px", borderRadius: 10, fontWeight: 700 }}>  {p.fantPts}pts</span>}
                  </td>
                  <td style={{ ...TD(i), fontSize: 12, fontWeight: 600, color: C.g5 }}>{p.team}</td>
                  <td style={{ ...TD(i), fontSize: 12, color: C.g5 }}>{p.pos}</td>
                  <td style={{ ...TD(i), fontSize: 12, color: C.g5, textAlign: "center" }}>{p.gp}</td>
                  {STAT_COLS.map(col => {
                    const val = p[col.key] ?? 0;
                    const isActive = sortKey === col.key;
                    const isPct = ["fg_pct","fg3_pct","ft_pct","ts_pct"].includes(col.key);
                    const display = isPct ? (val*100).toFixed(1)+"%" : col.key === "plus_minus" ? (val>0?"+":"")+val.toFixed(1) : col.key === "fantPts" ? val : val.toFixed(1);
                    return (
                      <td key={col.key} style={{
                        ...TD(i), textAlign: "right", paddingRight: 12,
                        fontWeight: isActive ? 700 : 400,
                        color: col.key==="fantPts"&&val>0?"#92400e":col.key==="plus_minus"&&val>0?"#166534":col.key==="plus_minus"&&val<0?"#991b1b":isActive?C.blue:C.g9,
                        background: isActive?(i%2===0?"#f0f6ff":"#e8f0fc"):(i%2===0?"#fff":"#F5F5F5"),
                      }}>{display}</td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <p style={{ fontSize: 12, color: C.g5, marginTop: 12 }}>2025-26 regular season   Source: Basketball Reference     = fantasy award pts this season</p>
    </PageShell>
  );
}

function DraftPage({ draftPicks: picks, setDraftPicks: setPicks, draftTrades: trades, setDraftTrades: setTrades }) {
  const scores = calcTeamScores(AWARDS);
  const standingsOrder = [...TEAMS].sort((a, b) => (scores[a.id]||0) - (scores[b.id]||0));
  const lotteryTeams = standingsOrder.slice(0, 3);
  const fixed4 = standingsOrder[3];
  const fixed5 = standingsOrder[4];
  const LOTTERY_CHANCES = [50, 35, 15];
  const [spinning, setSpinning] = useState(false);
  const [tradeFrom, setTradeFrom] = useState("");
  const [tradeTo, setTradeTo] = useState("");
  const [tradePick, setTradePick] = useState("");
  const [tradeNote, setTradeNote] = useState("");
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const drawnRef = useRef(false);

  const segments = lotteryTeams.map((t, i) => ({
    team: t, pct: LOTTERY_CHANCES[i], color: t.color,
    startDeg: LOTTERY_CHANCES.slice(0, i).reduce((a, b) => a + b * 3.6, 0),
    sweepDeg: LOTTERY_CHANCES[i] * 3.6,
  }));

  const drawWheel = (angle = 0) => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cx = canvas.width/2, cy = canvas.height/2, r = cx - 10;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const rad = d => d * Math.PI / 180;
    segments.forEach(seg => {
      const start = rad(seg.startDeg + angle - 90);
      const end = rad(seg.startDeg + seg.sweepDeg + angle - 90);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
      ctx.fillStyle = seg.color; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      const mid = rad(seg.startDeg + seg.sweepDeg/2 + angle - 90);
      const lx = cx + r*0.65*Math.cos(mid), ly = cy + r*0.65*Math.sin(mid);
      ctx.fillStyle = "#fff"; ctx.font = "bold 13px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(seg.team.name + " " + seg.pct + "%", lx, ly);
    });
    ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill(); ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#111"; ctx.font = "bold 11px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("LOTTERY", cx, cy);
    ctx.beginPath(); ctx.moveTo(cx+r+8, cy); ctx.lineTo(cx+r-12, cy-10); ctx.lineTo(cx+r-12, cy+10); ctx.closePath(); ctx.fillStyle = "#C8102E"; ctx.fill();
  };

  if (!drawnRef.current) { drawnRef.current = true; setTimeout(() => drawWheel(0), 100); }

  const spinWheel = () => {
    if (spinning || picks) return;
    setSpinning(true);
    const roll = Math.random() * 100;
    let winnerIdx = roll < 50 ? 0 : roll < 85 ? 1 : 2;
    const targetSeg = segments[winnerIdx];
    const targetAngle = 360 - (targetSeg.startDeg + targetSeg.sweepDeg/2);
    const totalSpins = 5*360 + targetAngle;
    const duration = 4000;
    const start = performance.now();
    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      drawWheel((ease * totalSpins) % 360);
      if (t < 1) { animRef.current = requestAnimationFrame(animate); }
      else {
        setSpinning(false);
        const winner = lotteryTeams[winnerIdx];
        const remaining = lotteryTeams.filter((_, i) => i !== winnerIdx).sort(() => Math.random() - 0.5);
        setPicks([winner, remaining[0], remaining[1], fixed4, fixed5]);
      }
    };
    animRef.current = requestAnimationFrame(animate);
  };

  const buildPickList = () => {
    if (!picks) return [];
    const r1 = picks.map((t, i) => ({ round:1, slot:i+1, originalOwner:t, currentOwner:t }));
    const r2 = [...picks].reverse().map((t, i) => ({ round:2, slot:i+1, originalOwner:t, currentOwner:t }));

        if ("R"+p.round+"-"+p.slot === tr.pick && p.currentOwner.name === tr.from) {
          const toTeam = TEAMS.find(t => t.name === tr.to);
          return { ...p, currentOwner: toTeam, traded: true, tradeNote: tr.note };
        }
        return p;
      });
    });
    return all;
  };
  const allPicks = buildPickList();

    if (!tradeFrom || !tradeTo || !tradePick || tradeFrom === tradeTo) return;
    setTrades(prev => [...prev, { from:tradeFrom, to:tradeTo, pick:tradePick, note:tradeNote }]);
    setTradeFrom(""); setTradeTo(""); setTradePick(""); setTradeNote("");
  };

  const resetLottery = () => { setPicks(null); setTrades([]); setTimeout(() => drawWheel(0), 50); };

  const ss = { border:"1.5px solid #D0D0D0", background:"#fff", color:"#111", padding:"8px 12px", borderRadius:6, fontFamily:"inherit", fontSize:13, cursor:"pointer", width:"100%" };

  return (
    <PageShell title="Draft Lottery & Picks" subtitle="2026 Jones League Draft">
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 28 }}>
        <div>
          <div style={{ ...CARD, marginBottom: 16 }}>
            <div style={{ ...BAR_HEADER, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={BAR_LABEL}>  Draft Lottery Wheel</span>
              {picks && <button onClick={resetLottery} style={{ background:"none", border:"1px solid #555", color:C.g5, padding:"3px 10px", borderRadius:4, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Reset</button>}
            </div>
            <div style={{ padding:20, display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
              <canvas ref={canvasRef} width={280} height={280} style={{ display:"block" }} />
              {!picks
                ? <button onClick={spinWheel} disabled={spinning} style={{ background:spinning?C.g3:C.red, color:"#fff", border:"none", padding:"12px 40px", borderRadius:6, fontWeight:800, fontSize:16, cursor:spinning?"not-allowed":"pointer", fontFamily:"inherit" }}>{spinning?"Spinning ":"  Spin Lottery"}</button>
                : <div style={{ textAlign:"center" }}><div style={{ fontWeight:800, fontSize:16 }}>  #1 Overall Pick:</div><div style={{ fontWeight:800, fontSize:22, color:picks[0].color, marginTop:4 }}>{picks[0].name}</div></div>}
            </div>
          </div>
          <div style={CARD}>
            <div style={BAR_HEADER}><span style={BAR_LABEL}>Lottery Odds</span></div>
            {lotteryTeams.map((t, i) => (
              <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", borderBottom:"1px solid #E8E8E8", background:i%2===0?"#fff":"#F5F5F5", borderLeft:"3px solid "+t.color }}>
                <span style={{ fontWeight:700, fontSize:14 }}>{t.name} <span style={{ fontSize:11, color:C.g5 }}>{i===0?"Last place":i===1?"3rd-to-last":"2nd-to-last"}</span></span>
                <span style={{ fontWeight:800, fontSize:16, color:t.color }}>{LOTTERY_CHANCES[i]}%</span>
              </div>
            ))}
            {[fixed4, fixed5].map((t, i) => (
              <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", borderBottom:"1px solid #E8E8E8", background:i%2===0?"#F5F5F5":"#fff", borderLeft:"3px solid "+t.color }}>

function TradesPage({ owner, onTradeAccepted }) {
  const mob = useIsMobile();
  const [trades, setTrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showPropose, setShowPropose] = useState(false);
  const [toTeam, setToTeam] = useState("");
  const [myPlayers, setMyPlayers] = useState([]);
  const [theirPlayers, setTheirPlayers] = useState([]);
  const [myPicks, setMyPicks] = useState([]);
  const [theirPicks, setTheirPicks] = useState([]);
  const [note, setNote] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [msg, setMsg] = useState("");

  const myTeam = TEAMS.find(t => t.id === owner.team_id);
  const otherTeams = TEAMS.filter(t => t.id !== owner.team_id);
  const targetTeam = TEAMS.find(t => t.id === toTeam);
  const picks = ["Round 1", "Round 2"];

  const loadTrades = async () => {
    setLoading(true);
    const data = await sbGetTrades();
    setTrades(data);
    setLoading(false);
  };

  useEffect(() => { loadTrades(); }, []);

  const toggle = (arr, setArr, item) =>
    setArr(arr.includes(item) ? arr.filter(x => x !== item) : [...arr, item]);

  const handlePropose = async () => {
    if (!toTeam || (myPlayers.length === 0 && myPicks.length === 0)) return;
    setSubmitting(true);
    const offered = [...myPlayers, ...myPicks.map(p => "Pick: " + p)];
    const requested = [...theirPlayers, ...theirPicks.map(p => "Pick: " + p)];
    await sbInsertTrade({ from_team: owner.team_id, to_team: toTeam, offered_players: offered, requested_players: requested, status: "pending", note: note || null, season: 3 });
    setShowPropose(false);
    setToTeam(""); setMyPlayers([]); setTheirPlayers([]); setMyPicks([]); setTheirPicks([]); setNote("");
    setMsg("Trade proposal sent!"); loadTrades(); setSubmitting(false);
    setTimeout(() => setMsg(""), 4000);
  };

  const handleAction = async (trade, action) => {
    await sbUpdateTrade(trade.id, { status: action, updated_at: new Date().toISOString() });
    if (action === "accepted") {
      const allPlayers = [
        ...(trade.offered_players || []).filter(p => !p.startsWith("Pick:")).map(p => ({ player: p, from_team: trade.from_team, to_team: trade.to_team, season: 3, trade_id: trade.id })),
        ...(trade.requested_players || []).filter(p => !p.startsWith("Pick:")).map(p => ({ player: p, from_team: trade.to_team, to_team: trade.from_team, season: 3, trade_id: trade.id })),
      ];
      for (const o of allPlayers) await sbInsertRosterOverride(o);
      if (onTradeAccepted) onTradeAccepted();
    }
    setMsg(action === "accepted" ? "Trade accepted! Rosters updated." : action === "rejected" ? "Trade rejected." : "Trade vetoed.");
    loadTrades();
    setTimeout(() => setMsg(""), 4000);
  };

  const statusColor = { pending: "#F5A623", accepted: "#16a34a", rejected: "#dc2626", vetoed: "#6b7280" };
  const statusBg = { pending: "#FEF9C3", accepted: "#DCFCE7", rejected: "#FEE2E2", vetoed: "#F3F4F6" };
  const statusText = { pending: "#854D0E", accepted: "#166534", rejected: "#991B1B", vetoed: "#374151" };
  const statusLabel = { pending: "Pending", accepted: "Accepted", rejected: "Rejected", vetoed: "Vetoed" };
  const myTrades = trades.filter(t => t.from_team === owner.team_id || t.to_team === owner.team_id);
  const pendingForMe = trades.filter(t => t.to_team === owner.team_id && t.status === "pending");
  const inputStyle = { display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 6, cursor: "pointer", fontSize: 13, border: "0.5px solid transparent" };

  return (
    <PageShell title="Trades" subtitle="Season 3 - 2025-26 - Propose and manage trades">
      {msg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 600 }}>  {msg}</div>}
      {pendingForMe.length > 0 && (
        <div style={{ background: "#FEF9C3", border: "0.5px solid #FDE047", borderRadius: 10, padding: "14px 18px", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 22 }}> </span>
          <div><div style={{ fontWeight: 700, fontSize: 14, color: "#854D0E" }}>You have {pendingForMe.length} incoming trade offer{pendingForMe.length > 1 ? "s" : ""}</div>
          <div style={{ fontSize: 12, color: "#92400E", marginTop: 2 }}>Scroll down to review and respond</div></div>
        </div>
      )}
      <div style={{ marginBottom: 20 }}>
        <button onClick={() => { setShowPropose(!showPropose); setToTeam(""); setMyPlayers([]); setTheirPlayers([]); setMyPicks([]); setTheirPicks([]); setNote(""); }}
          style={{ background: showPropose ? "#374151" : "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
          {showPropose ? "Cancel" : "+ Propose Trade"}
        </button>
      </div>
      {showPropose && (
        <div style={{ ...CARD, marginBottom: 24 }}>
          <div style={{ background: "#000", padding: "12px 20px" }}><span style={BAR_LABEL}>New trade proposal</span></div>
          <div style={{ padding: 20 }}>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Trade with</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {otherTeams.map(t => (
                  <button key={t.id} onClick={() => { setToTeam(t.id); setTheirPlayers([]); setTheirPicks([]); }}
                    style={{ background: toTeam === t.id ? t.color : "transparent", color: toTeam === t.id ? "#fff" : C.g7, border: "0.5px solid " + (toTeam === t.id ? t.color : C.g3), borderRadius: 20, padding: "7px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                    {t.name}
                  </button>
                ))}
              </div>
            </div>
            {toTeam && targetTeam && (
              <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 20 }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: myTeam.color, marginBottom: 10 }}>You offer ({myTeam.name})</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", marginBottom: 6 }}>Players</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3, maxHeight: 240, overflowY: "auto", marginBottom: 12 }}>
                    {myTeam.roster.map(p => { const sel = myPlayers.includes(p); return (
                      <label key={p} style={{ ...inputStyle, background: sel ? myTeam.color + "18" : C.g1, border: "0.5px solid " + (sel ? myTeam.color : "transparent") }}>
                        <input type="checkbox" checked={sel} onChange={() => toggle(myPlayers, setMyPlayers, p)} style={{ accentColor: myTeam.color }} />
                        <span style={{ color: sel ? "#000" : C.g7, fontWeight: sel ? 600 : 400 }}>{p}</span>
                      </label>
                    ); })}
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", marginBottom: 6 }}>Draft picks</div>
                  {picks.map(p => { const sel = myPicks.includes(p); return (
                    <label key={p} style={{ ...inputStyle, background: sel ? myTeam.color + "18" : C.g1, border: "0.5px solid " + (sel ? myTeam.color : "transparent"), marginBottom: 3 }}>
                      <input type="checkbox" checked={sel} onChange={() => toggle(myPicks, setMyPicks, p)} style={{ accentColor: myTeam.color }} />
                      <span style={{ fontSize: 13, color: sel ? "#000" : C.g7 }}>{p} pick</span>
                    </label>
                  ); })}
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: targetTeam.color, marginBottom: 10 }}>You receive ({targetTeam.name})</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", marginBottom: 6 }}>Players</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3, maxHeight: 240, overflowY: "auto", marginBottom: 12 }}>
                    {targetTeam.roster.map(p => { const sel = theirPlayers.includes(p); return (
                      <label key={p} style={{ ...inputStyle, background: sel ? targetTeam.color + "18" : C.g1, border: "0.5px solid " + (sel ? targetTeam.color : "transparent") }}>
                        <input type="checkbox" checked={sel} onChange={() => toggle(theirPlayers, setTheirPlayers, p)} style={{ accentColor: targetTeam.color }} />
                        <span style={{ color: sel ? "#000" : C.g7, fontWeight: sel ? 600 : 400 }}>{p}</span>
                      </label>
                    ); })}
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", marginBottom: 6 }}>Draft picks</div>
                  {picks.map(p => { const sel = theirPicks.includes(p); return (
                    <label key={p} style={{ ...inputStyle, background: sel ? targetTeam.color + "18" : C.g1, border: "0.5px solid " + (sel ? targetTeam.color : "transparent"), marginBottom: 3 }}>
                      <input type="checkbox" checked={sel} onChange={() => toggle(theirPicks, setTheirPicks, p)} style={{ accentColor: targetTeam.color }} />
                      <span style={{ fontSize: 13, color: sel ? "#000" : C.g7 }}>{p} pick</span>
                    </label>
                  ); })}
                </div>
              </div>
            )}
            {toTeam && (
              <div style={{ borderTop: "0.5px solid #E8E8E8", paddingTop: 16 }}>
                <input value={note} onChange={e => setNote(e.target.value)} placeholder="Add a note (optional)..."
                  style={{ width: "100%", border: "0.5px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none", marginBottom: 12 }} />
                <button onClick={handlePropose} disabled={submitting || !toTeam || (myPlayers.length === 0 && myPicks.length === 0)}
                  style={{ background: (!toTeam||(myPlayers.length===0&&myPicks.length===0))?C.g3:"#000", color:"#fff", border:"none", borderRadius:8, padding:"11px 24px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                  {submitting ? "Sending..." : "Send trade proposal"}
                </button>
              </div>
            )}
          </div>
        </div>
      )}
      {loading ? <div style={{ textAlign:"center", color:C.g5, padding:40 }}>Loading...</div>
      : myTrades.length === 0 ? (
        <div style={{ ...CARD, padding:48, textAlign:"center" }}>
          <div style={{ fontSize:36, marginBottom:12 }}> </div>
          <div style={{ fontWeight:700, fontSize:16, marginBottom:6 }}>No trades yet</div>
          <div style={{ fontSize:13, color:C.g5 }}>Propose a trade above.</div>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {myTrades.map(trade => {
            const fromT = TEAMS.find(t => t.id===trade.from_team);
            const toT2 = TEAMS.find(t => t.id===trade.to_team);
            const isIncoming = trade.to_team===owner.team_id && trade.status==="pending";
            const canVeto = owner.is_commissioner && trade.status==="pending" && trade.from_team!==owner.team_id && trade.to_team!==owner.team_id;
            return (
              <div key={trade.id} style={{ ...CARD, opacity:trade.status!=="pending"?0.8:1 }}>
                <div style={{ padding:"14px 20px", borderBottom:"0.5px solid #E8E8E8", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:statusColor[trade.status] }} />
                    <span style={{ fontSize:14, fontWeight:700, color:fromT?.color }}>{fromT?.name}</span>
                    <span style={{ fontSize:13, color:C.g5 }}>to</span>
                    <span style={{ fontSize:14, fontWeight:700, color:toT2?.color }}>{toT2?.name}</span>
                    <span style={{ fontSize:11, color:C.g5 }}>{new Date(trade.created_at).toLocaleDateString()}</span>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:statusBg[trade.status], color:statusText[trade.status] }}>{statusLabel[trade.status]}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
                  <div style={{ padding:"14px 20px", borderRight:"0.5px solid #E8E8E8" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:C.g5, textTransform:"uppercase", marginBottom:8 }}>{fromT?.name} sends</div>
                    {(trade.offered_players||[]).map((p,i) => <div key={i} style={{ fontSize:13, padding:"5px 8px", background:C.g1, borderRadius:5, marginBottom:4 }}>{p.startsWith("Pick:")?"  ":"  "}{p.startsWith("Pick:")?p.replace("Pick:","").trim()+" pick":p}</div>)}
                  </div>
                  <div style={{ padding:"14px 20px" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:C.g5, textTransform:"uppercase", marginBottom:8 }}>{toT2?.name} sends</div>
                    {(trade.requested_players||[]).map((p,i) => <div key={i} style={{ fontSize:13, padding:"5px 8px", background:C.g1, borderRadius:5, marginBottom:4 }}>{p.startsWith("Pick:")?"  ":"  "}{p.startsWith("Pick:")?p.replace("Pick:","").trim()+" pick":p}</div>)}
                  </div>
                </div>
                {(trade.note||isIncoming||canVeto) && (
                  <div style={{ padding:"12px 20px", background:"#fafafa", borderTop:"0.5px solid #E8E8E8" }}>
                    {trade.note && <div style={{ fontSize:12, color:C.g7, fontStyle:"italic", marginBottom:isIncoming||canVeto?12:0 }}>"{trade.note}"</div>}
                    {isIncoming && <div style={{ display:"flex", gap:8 }}>
                      <button onClick={() => handleAction(trade,"accepted")} style={{ background:"#DCFCE7", color:"#166534", border:"0.5px solid #BBF7D0", borderRadius:6, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Accept</button>
                      <button onClick={() => handleAction(trade,"rejected")} style={{ background:"#FEE2E2", color:"#991B1B", border:"0.5px solid #FECACA", borderRadius:6, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Reject</button>
                    </div>}
                    {canVeto && <button onClick={() => handleAction(trade,"vetoed")} style={{ background:"#F3F4F6", color:"#374151", border:"0.5px solid #D1D5DB", borderRadius:6, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Veto trade</button>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </PageShell>
  );
}


function App() {
  const [page, setPage] = useState("Standings");
  const [rosterTeam, setRosterTeam] = useState("jake");
  const [draftPicks, setDraftPicks] = useState(null);
  const [draftTrades, setDraftTrades] = useState([]);
  const [overrides, setOverrides] = useState([]);
  const [owner, setOwner] = useState(() => {
    try { return JSON.parse(localStorage.getItem("jl_owner")); } catch(e) { return null; }
  });

  const handleLogin = (ownerData) => setOwner(ownerData);
  const handleLogout = async () => { await sbSignOut(); setOwner(null); setPage("Standings"); };
  const refreshOverrides = () => sbGetRosterOverrides(3).then(data => setOverrides(data));

  useEffect(() => { sbGetRosterOverrides(3).then(data => setOverrides(data)); }, []);

  if (!owner) return <LoginPage onLogin={handleLogin} />;
  const liveTeams = applyRosterOverrides(overrides);
  const liveAwards = applyAwardOverrides(overrides);

  return (
    <>
      <style>{"* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #F5F5F5; font-family: Inter, sans-serif; overflow-x: hidden; } button { font-family: Inter, sans-serif; } input, select { font-size: 16px; }"}</style>
      <Nav page={page} setPage={setPage} owner={owner} onLogout={handleLogout} />
      {page === "Standings" && <StandingsPage onSelectTeam={(id) => { setRosterTeam(id); setPage("Rosters"); }} liveTeams={liveTeams} liveAwards={liveAwards} />}
      {page === "Rosters" && <RostersPage draftPicks={draftPicks} draftTrades={draftTrades} initialTeam={rosterTeam} owner={owner} liveTeams={liveTeams} liveAwards={liveAwards} />}
      {page === "Trades" && <TradesPage owner={owner} onTradeAccepted={refreshOverrides} />}
      {page === "Available Players" && <FreeAgentsPage owner={owner} liveTeams={liveTeams} onRosterChange={refreshOverrides} />}
      {page === "FA Coaches" && <FACoachesPage />}
      {page === "Scoring" && <ScoringPage />}
      {page === "Top 3 Kyrie's" && <Top3KyriesPage owner={owner} />}
      {page === "Draft" && <DraftPage draftPicks={draftPicks} setDraftPicks={setDraftPicks} draftTrades={draftTrades} setDraftTrades={setDraftTrades} />}
      {page === "History" && <LeagueHistoryPage liveTeams={liveTeams} />}
      {page === "Schedule" && <SchedulePage />}
      {page === "Odds" && <OddsPage />}
      {!["Standings","Rosters","Trades","Available Players","FA Coaches","Scoring","Top 3 Kyrie's","Draft","History","Schedule","Odds"].includes(page) && (
        <div style={{ maxWidth: 980, margin: "0 auto", padding: "40px 20px", textAlign: "center", color: "#888" }}>
          <h2>{page} coming soon</h2>
        </div>
      )}
      <div style={{ background: "#000", color: "#555", textAlign: "center", padding: "14px", fontSize: 11, fontWeight: 600, textTransform: "uppercase" }}>
        Jones League Dynasty League - Season 3 - 2025-26
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
  window.addEventListener("load", function() {
    var logoSVG = "<svg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'><defs><clipPath id='bc'><circle cx='40' cy='40' r='37'/></clipPath><mask id='tm'><rect width='80' height='80' fill='white'/><rect x='22' y='28' width='36' height='22' fill='black'/></mask></defs><circle cx='40' cy='40' r='38' fill='#C8102E'/><path d='M28,2.5 Q20,40 28,77.5 Q32,79 36,79.5 Q40,80 44,79.5 Q48,79 52,77.5 Q60,40 52,2.5 Q48,1 44,0.5 Q40,0 36,0.5 Q32,1 28,2.5Z' fill='#1D428A'/><g clip-path='url(#bc)'><line x1='40' y1='0' x2='40' y2='28' stroke='white' stroke-width='2' opacity='0.7'/><line x1='40' y1='50' x2='40' y2='80' stroke='white' stroke-width='2' opacity='0.7'/><path d='M2,40 Q40,34 78,40' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' opacity='0.8' mask='url(#tm)'/></g><path d='M10,4 Q22,40 10,76' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' clip-path='url(#bc)'/><path d='M70,4 Q58,40 70,76' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' clip-path='url(#bc)'/><text x='40' y='50' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-size='22' font-weight='900' fill='white'>JL</text></svg>";
    function tryInject() {
      var navSlot = document.getElementById("jl-logo-slot");
      var loginSlot = document.getElementById("login-logo");
      if (navSlot) navSlot.innerHTML = logoSVG;
      if (loginSlot) loginSlot.innerHTML = logoSVG;
      if (!navSlot && !loginSlot) setTimeout(tryInject, 200);
