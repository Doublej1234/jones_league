      setEndSeasonError("Network error: " + e.message + ". Try updating season manually in Supabase.");
    }
    setEndingSeason(false);
  };

  return (
    <PageShell title="Admin Panel" subtitle="Commissioner tools - Add awards, manage season data">
      {msg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 700 }}>{msg}</div>}

      {/* Auto-fill Awards */}
      <div style={{ ...CARD, marginBottom: 20 }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={BAR_LABEL}>Auto-fill Awards with AI</span>
          <span style={{ fontSize: 11, color: "#888" }}>Powered by Claude</span>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ fontSize: 13, color: C.g5, marginBottom: 14 }}>
            Click the button below to automatically look up all 2026-27 NBA award results and pre-fill them for your roster. Review the results before saving.
          </div>
          {autoError && <div style={{ background: "#FEE2E2", border: "0.5px solid #FECACA", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#991B1B" }}>{autoError}</div>}
          {autoMsg && <div style={{ background: "#DBEAFE", border: "0.5px solid #BFDBFE", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#1d4ed8", fontWeight: 600 }}>{autoMsg}</div>}
          <button onClick={handleAutoFill} disabled={autoFilling}
            style={{ background: autoFilling ? C.g3 : "#1d4ed8", color: "#fff", border: "none", borderRadius: 8, padding: "11px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", marginRight: 10 }}>
            {autoFilling ? "Searching for awards..." : "Auto-fill Awards"}
          </button>
          {autoResults.length > 0 && (
            <button onClick={handleSaveAll} disabled={savingAll}
              style={{ background: savingAll ? C.g3 : "#16a34a", color: "#fff", border: "none", borderRadius: 8, padding: "11px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              {savingAll ? "Saving..." : "Save All " + autoResults.length + " Awards"}
            </button>
          )}
          {autoResults.length > 0 && (
            <div style={{ marginTop: 16, border: "1px solid #E8E8E8", borderRadius: 8, overflow: "hidden" }}>
              <div style={{ background: "#F5F5F5", padding: "8px 16px", fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5 }}>
                Review — {autoResults.length} awards found
              </div>
              {autoResults.map((a, i) => {
                const t = teams.find(x => x.id === a.team_id);
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", borderTop: "1px solid #E8E8E8", background: i%2===0?"#fff":"#fafafa" }}>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontWeight: 700 }}>{a.player}</span>
                      <span style={{ fontSize: 11, color: t?.color || C.g5, fontWeight: 700, marginLeft: 8 }}>{t?.name || a.team_id}</span>
                    </div>
                    <span style={{ fontSize: 12, color: C.g5 }}>{a.award} · {a.place}</span>
                    <span style={{ fontWeight: 800, fontSize: 15, color: t?.color || C.red }}>{a.pts}pts</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Add Award Form */}
      <div style={{ ...CARD, marginBottom: 20 }}>
        <div style={{ background: "#000", padding: "12px 20px" }}>
          <span style={BAR_LABEL}>Add Award</span>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 14, marginBottom: 14 }}>

            {/* Player search */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Player / Coach</label>
              {player ? (
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8 }}>
                  <span style={{ flex: 1, fontWeight: 700 }}>{player}</span>
                  <button onClick={() => { setPlayer(""); setPlayerSearch(""); setTeamId(""); }} style={{ background: "none", border: "none", color: C.g5, cursor: "pointer", fontSize: 16 }}>x</button>
                </div>
              ) : (
                <div style={{ position: "relative" }}>
                  <input value={playerSearch} onChange={e => setPlayerSearch(e.target.value)} placeholder="Search player or coach..."
                    style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
                  {filteredPlayers.length > 0 && (
                    <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #E8E8E8", borderRadius: 8, zIndex: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
                      {filteredPlayers.map(p => {
                        const t = teams.find(t => t.roster.includes(p) || t.coach === p || t.asstCoach === p);
                        return (
                          <div key={p} onClick={() => { setPlayer(p); setPlayerSearch(""); if (t) setTeamId(t.id); }}
                            style={{ padding: "10px 14px", cursor: "pointer", fontSize: 13, display: "flex", justifyContent: "space-between", borderBottom: "0.5px solid #F5F5F5" }}
                            onMouseEnter={e => e.currentTarget.style.background = "#F5F5F5"}
                            onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
                            <span>{p}</span>
                            {t && <span style={{ fontSize: 11, color: t.color, fontWeight: 700 }}>{t.name}</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Team */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Fantasy Team</label>
              <select value={teamId} onChange={e => setTeamId(e.target.value)}
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none", background: "#fff" }}>
                <option value="">Select team...</option>
                {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>

            {/* Award type */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Award Type</label>
              <select value={award} onChange={e => setAward(e.target.value)}
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none", background: "#fff" }}>
                <option value="">Select award...</option>
                {AWARD_TYPES.map(a => <option key={a.key} value={a.key}>{a.label}</option>)}
              </select>
            </div>

            {/* Place */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Place / Detail</label>
              <input value={place} onChange={e => setPlace(e.target.value)} placeholder="e.g. 1st, 2nd, Starter..."
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
            </div>

            {/* Points */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Points</label>
              <input type="number" value={pts} onChange={e => setPts(e.target.value)} placeholder="e.g. 12"
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
            </div>

          </div>

          {/* Preview */}
          {player && teamId && award && pts && (
            <div style={{ background: C.g1, borderRadius: 8, padding: "12px 16px", marginBottom: 14, fontSize: 13, color: "#333" }}>
              Preview: <strong>{player}</strong> ({teams.find(t=>t.id===teamId)?.name}) — {AWARD_TYPES.find(a=>a.key===award)?.label} {place && "(" + place + ")"} = <strong>{pts} pts</strong>
            </div>
          )}

          <button onClick={handleSave} disabled={saving || !player || !teamId || !award || !pts}
            style={{ background: (!player||!teamId||!award||!pts) ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 8, padding: "11px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {saving ? "Saving..." : "Add Award"}
          </button>
        </div>
      </div>

      {/* Existing Supabase Awards */}
      <div style={CARD}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={BAR_LABEL}>Season 4 Awards Added via Admin</span>
          <span style={{ fontSize: 11, color: "#888" }}>{sbAwards.length} awards</span>
        </div>
        {loading ? (
          <div style={{ padding: 32, textAlign: "center", color: C.g5 }}>Loading...</div>
        ) : sbAwards.length === 0 ? (
          <div style={{ padding: 32, textAlign: "center", color: C.g5, fontSize: 13 }}>No awards added via admin yet. Hardcoded awards still apply.</div>
        ) : (
          sbAwards.map((a, i) => {
            const t = teams.find(t => t.id === a.team_id);
            return (
              <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 20px", borderTop: "1px solid #E8E8E8", background: i%2===0?"#fff":"#fafafa" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{a.player}</div>
                  <div style={{ fontSize: 12, color: C.g5, marginTop: 2 }}>
                    {t && <span style={{ color: t.color, fontWeight: 700 }}>{t.name} · </span>}
                    {AWARD_TYPES.find(x=>x.key===a.award)?.label || a.award}
                    {a.place && " · " + a.place}
                  </div>
                </div>
                <span style={{ fontWeight: 800, fontSize: 18, color: t?.color || C.red }}>{a.pts} pts</span>
                <button onClick={() => handleDelete(a.id)} disabled={deleting === a.id}
                  style={{ background: deleting===a.id?"#fee2e2":"transparent", color: "#dc2626", border: "1px solid #fecaca", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  {deleting === a.id ? "..." : "Delete"}
                </button>
              </div>
            );
          })
        )}
      </div>

      {/* Schedule Editor */}
      <div style={{ ...CARD, marginTop: 20 }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={BAR_LABEL}>Edit Schedule & Dates</span>
          {scheduleMsg && <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>{scheduleMsg}</span>}
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {scheduleEvents.map((ev, i) => (
              <div key={ev.id} style={{ border: "1px solid #E8E8E8", borderRadius: 8, overflow: "hidden" }}>
                <div style={{ background: "#F5F5F5", padding: "8px 14px", fontWeight: 700, fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span>{ev.title}</span>
                  <select value={ev.status} onChange={e => updateEvent(ev.id, "status", e.target.value)}
                    style={{ border: "1px solid #E8E8E8", borderRadius: 6, padding: "3px 8px", fontSize: 12, fontFamily: "inherit", background: "#fff" }}>
                    <option value="future">Future</option>
                    <option value="tbd">TBD</option>
                    <option value="upcoming">Upcoming</option>
                    <option value="active">Active</option>
                    <option value="completed">Completed</option>
                  </select>
                </div>
                <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 8 }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>Date</label>
                    <input value={ev.date || ""} onChange={e => updateEvent(ev.id, "date", e.target.value)}
                      placeholder="e.g. June 25, 2026 or TBD"
                      style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 6, padding: "8px 12px", fontSize: 13, fontFamily: "inherit", outline: "none" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>Description</label>
                    <textarea value={ev.description || ""} onChange={e => updateEvent(ev.id, "description", e.target.value)} rows={2}
                      style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 6, padding: "8px 12px", fontSize: 13, fontFamily: "inherit", outline: "none", resize: "vertical" }} />
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={handleScheduleSave} disabled={savingSchedule}
            style={{ marginTop: 16, background: "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {savingSchedule ? "Saving..." : "Save Schedule"}
          </button>
        </div>
      </div>

      {/* Close Top 3 Kyries Voting */}
      <div style={{ ...CARD, marginTop: 20 }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={BAR_LABEL}>Top 3 Kyrie's — Close Voting</span>
          <span style={{ fontSize: 11, color: kyriesClosed ? "#4ade80" : "#888" }}>{kyriesClosed ? "CLOSED" : "voting open"}</span>
        </div>
        <div style={{ padding: 20 }}>
          {kyrieMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#166534", fontWeight: 700 }}>{kyrieMsg}</div>}
          {kyrieError && <div style={{ background: "#FEE2E2", border: "0.5px solid #FECACA", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#991B1B" }}>{kyrieError}</div>}

          <div style={{ fontSize: 13, color: C.g5, marginBottom: 14 }}>
            {kyrieVotes.length} of 5 owners have voted. Closing voting will finalize the Top 3 and award points.
          </div>

          {/* Current tally */}
          {Object.keys(kyrieTally).length > 0 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Current standings</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {Object.entries(kyrieTally).sort((a,b) => b[1]-a[1]).map(([name, pts], i) => (
                  <div key={name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 14px", background: i < 3 ? ["#fef2f2","#fefce8","#f0fdf4"][i] : C.g1, borderRadius: 8 }}>
                    <span style={{ fontSize: 16, fontWeight: 900, color: ["#dc2626","#7c3aed","#ea580c","#888","#888"][i], minWidth: 28 }}>#{i+1}</span>
                    <span style={{ flex: 1, fontWeight: i < 3 ? 700 : 400, fontSize: 13 }}>{name}</span>
                    <span style={{ fontWeight: 700, fontSize: 13, color: C.g5 }}>{pts} vote pts</span>
                    {i < 3 && <span style={{ fontSize: 11, fontWeight: 700, padding: "1px 8px", borderRadius: 8, background: ["#dc2626","#7c3aed","#ea580c"][i], color: "#fff" }}>{[3,2,1][i]} league pts</span>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Who has voted */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Votes received</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {(liveTeams||TEAMS).map(t => {
                const voted = kyrieVotes.some(v => v.voter_team === t.id);
                return (
                  <span key={t.id} style={{ fontSize: 12, fontWeight: 700, padding: "3px 12px", borderRadius: 20, background: voted ? t.color : C.g2, color: voted ? "#fff" : C.g5 }}>
                    {t.name} {voted ? "✓" : "—"}
                  </span>
                );
              })}
            </div>
          </div>

          <button onClick={handleCloseKyrieVoting} disabled={closingKyries || kyriesClosed || Object.keys(kyrieTally).length < 3}
            style={{ background: kyriesClosed || Object.keys(kyrieTally).length < 3 ? C.g3 : "#C8102E", color: "#fff", border: "none", borderRadius: 8, padding: "11px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {kyriesClosed ? "Voting Closed" : closingKyries ? "Closing..." : "Close Voting & Award Points"}
          </button>
        </div>
      </div>

      {/* End Season */}
      <div style={{ ...CARD, marginTop: 20, border: showEndSeason ? "2px solid #C8102E" : "1px solid #E8E8E8" }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={BAR_LABEL}>End Season / Start New Season</span>
          <span style={{ fontSize: 11, color: "#555" }}>commissioner only</span>
        </div>
        <div style={{ padding: 20 }}>
          {endSeasonMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "12px 16px", marginBottom: 16, fontSize: 14, color: "#166534", fontWeight: 700 }}>{endSeasonMsg}</div>}
          {endSeasonError && <div style={{ background: "#FEE2E2", border: "0.5px solid #FECACA", borderRadius: 8, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "#991B1B" }}>{endSeasonError}</div>}

          {/* Summary stats */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
            {[
              { label: "Current season", value: "Season 4", sub: "2026-27" },
              { label: "Teams", value: (liveTeams||TEAMS).length, sub: "owners" },
              { label: "Pending", value: "1", sub: "Top 3 Kyries" },
            ].map((s, i) => (
              <div key={i} style={{ background: C.g1, borderRadius: 8, padding: "12px 14px" }}>
                <div style={{ fontSize: 12, color: C.g5, marginBottom: 4 }}>{s.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#000" }}>{s.value}</div>
                <div style={{ fontSize: 11, color: C.g5 }}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* What happens checklist */}
          {!showEndSeason && (
            <div>
              <div style={{ fontSize: 13, color: C.g5, marginBottom: 12 }}>What happens when you end the season:</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
                {[
                  { text: "Final standings, rosters & awards archived to Season 4 history", ok: true },
                  { text: "Rosters carry over to Season 4", ok: true },
                  { text: "Award points reset to 0", ok: true },
                  { text: "Draft picks & waiver wire cleared", ok: true },
                  { text: "Season counter increments to Season 4", ok: true },
                  { text: "This cannot be undone", ok: false },
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: item.ok ? "#333" : "#C8102E" }}>
                    <span style={{ fontSize: 16, fontWeight: 700 }}>{item.ok ? "✓" : "⚠"}</span>
                    {item.text}
                  </div>
                ))}
              </div>
              <button onClick={handleShowEndSeason}
                style={{ background: "#C8102E", color: "#fff", border: "none", borderRadius: 8, padding: "11px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                End Season 4 & Start Season 5
              </button>
            </div>
          )}

          {/* Confirmation screen */}
          {showEndSeason && (
            <div>
              <div style={{ fontSize: 13, color: C.g5, marginBottom: 12 }}>Season 3 final standings to be archived:</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 20 }}>
                {previewStandings.map((s, i) => {
                  const t = (liveTeams||TEAMS).find(x => x.name === s.name);
                  return (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 14px", background: i===0 ? (t?.color||C.red)+"15" : C.g1, borderRadius: 8, border: i===0 ? "1px solid "+(t?.color||C.red)+"30" : "none" }}>
                      <span style={{ fontWeight: i===0 ? 700 : 400, fontSize: 13, color: i===0 ? (t?.color||C.red) : "#000" }}>
                        {["1st","2nd","3rd","4th","5th"][i]} — {s.name}
                      </span>
                      <span style={{ fontWeight: 700, color: i===0 ? (t?.color||C.red) : C.g5, fontSize: 13 }}>{typeof s.pts === "number" ? (s.pts%1===0?s.pts:s.pts.toFixed(1)) : s.pts} pts</span>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 13, color: C.g5, display: "block", marginBottom: 6 }}>
                  Type <strong>END SEASON 3</strong> to confirm
                </label>
                <input value={confirmText} onChange={e => setConfirmText(e.target.value)}
                  placeholder="END SEASON 4"
                  style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => { setShowEndSeason(false); setConfirmText(""); }}
                  style={{ flex: 1, padding: "10px 16px", fontSize: 13, cursor: "pointer", borderRadius: 8, border: "1px solid #E8E8E8", background: "#fff", fontFamily: "inherit" }}>
                  Cancel
                </button>
                <button onClick={handleEndSeason}
                  disabled={confirmText !== "END SEASON 4" || endingSeason}
                  style={{ flex: 2, padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: confirmText === "END SEASON 4" ? "pointer" : "not-allowed", borderRadius: 8, border: "none", background: confirmText === "END SEASON 4" ? "#C8102E" : C.g3, color: "#fff", fontFamily: "inherit", transition: "background 0.2s" }}>
                  {endingSeason ? "Archiving Season 4..." : "Confirm — Archive Season 4"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </PageShell>
  );
}


function ProfilePage({ owner, onOwnerUpdate, liveTeams, onRosterChange }) {
  const mob = useIsMobile();
  const [displayName, setDisplayName] = useState(owner.name || "");
  const [teamName, setTeamName] = useState(owner.team_name || "");
  const [savingProfile, setSavingProfile] = useState(false);
  const [profileMsg, setProfileMsg] = useState("");

  const [newEmail, setNewEmail] = useState("");
  const [savingEmail, setSavingEmail] = useState(false);
  const [emailMsg, setEmailMsg] = useState("");
  const [emailError, setEmailError] = useState("");

  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [savingPw, setSavingPw] = useState(false);
  const [pwMsg, setPwMsg] = useState("");
  const [pwError, setPwError] = useState("");

  const teams = liveTeams || TEAMS;
  const team = teams.find(t => t.id === owner.team_id);
  const [teamColor, setTeamColor] = useState(owner.team_color || team?.color || "#C8102E");
  const [savingColor, setSavingColor] = useState(false);
  const [colorMsg, setColorMsg] = useState("");

  const NBA_COLORS = [
    '#C8102E','#1D428A','#007A33','#552583','#0D9488',
    '#006BB6','#CE1141','#00471B','#002B5C','#E56020',
    '#724C9F','#002D62','#B4975A','#00788C','#F97316',
    '#5D76A9','#860038','#EF3B24','#00A94F','#236192',
    '#012B77','#963821','#0E2240','#FFC72C','#000000',
  ];
  const BOLD_COLORS = [
    '#DC2626','#EA580C','#D97706','#CA8A04','#16A34A',
    '#0284C7','#2563EB','#7C3AED','#DB2777','#E11D48',
    '#0891B2','#059669','#65A30D','#9333EA','#C026D3',
  ];

  const handleSaveColor = async () => {
    setSavingColor(true);
    await sbUpdateOwner(owner.id, { team_color: teamColor });
    const updated = { ...owner, team_color: teamColor };
    localStorage.setItem("jl_owner", JSON.stringify(updated));
    if (onOwnerUpdate) onOwnerUpdate(updated);
    if (onRosterChange) onRosterChange();
    setColorMsg("Color saved!");
    setSavingColor(false);
    setTimeout(() => setColorMsg(""), 3000);
  };

  const handleSaveProfile = async () => {
    setSavingProfile(true);
    const updates = { name: displayName.trim() };
    if (teamName.trim()) updates.team_name = teamName.trim();
    const result = await sbUpdateOwner(owner.id, updates);
    if (result.ok) {
      const updated = { ...owner, ...updates };
      localStorage.setItem("jl_owner", JSON.stringify(updated));
      if (onOwnerUpdate) onOwnerUpdate(updated);
      setProfileMsg("Profile updated!");
    } else {
      setProfileMsg("Error saving. Try again.");
    }
    setSavingProfile(false);
    setTimeout(() => setProfileMsg(""), 4000);
  };

  const handleChangePw = async () => {
    setPwError("");
    if (newPw !== confirmPw) { setPwError("Passwords do not match."); return; }
    if (newPw.length < 6) { setPwError("Password must be at least 6 characters."); return; }
    setSavingPw(true);
    const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + localStorage.getItem("jl_token"), "Content-Type": "application/json" },
      body: JSON.stringify({ password: newPw })
    });
    if (res.ok) {
      setPwMsg("Password updated successfully!");
      setCurrentPw(""); setNewPw(""); setConfirmPw("");
    } else {
      const err = await res.json();
      setPwError(err.message || "Error updating password.");
    }
    setSavingPw(false);
    setTimeout(() => setPwMsg(""), 4000);
  };

  const handleChangeEmail = async () => {
    setEmailError("");
    if (!newEmail.includes("@")) { setEmailError("Please enter a valid email."); return; }
    setSavingEmail(true);
    const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + localStorage.getItem("jl_token"), "Content-Type": "application/json" },
      body: JSON.stringify({ email: newEmail })
    });
    if (res.ok) {
      setEmailMsg("Confirmation sent to " + newEmail + ". Check your inbox to confirm the change.");
      setNewEmail("");
    } else {
      const err = await res.json().catch(() => ({}));
      setEmailError(err.message || "Error updating email.");
    }
    setSavingEmail(false);
    setTimeout(() => setEmailMsg(""), 6000);
  };

  return (
    <PageShell title="My Profile" subtitle={"Manage your account settings - " + owner.name}>
      {/* Team identity */}
      <div style={{ ...CARD, marginBottom: 20 }}>
        <div style={{ background: team?.color || "#000", padding: "12px 20px", display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: "50%", background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 18, color: "#fff" }}>
            {(owner.name || "?")[0].toUpperCase()}
          </div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 16, color: "#fff" }}>{owner.name}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)" }}>{team?.name || ""} · {owner.is_commissioner ? "Commissioner" : "Owner"}</div>
          </div>
        </div>
        <div style={{ padding: 20 }}>
          {profileMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 700 }}>{profileMsg}</div>}
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 14, marginBottom: 16 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Display Name</label>
              <input value={displayName} onChange={e => setDisplayName(e.target.value)}
                placeholder="Your name..."
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
              <div style={{ fontSize: 11, color: C.g5, marginTop: 4 }}>Shown in nav and across the site</div>
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Team Nickname</label>
              <input value={teamName} onChange={e => setTeamName(e.target.value)}
                placeholder={team?.name + "'s team..."}
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
              <div style={{ fontSize: 11, color: C.g5, marginTop: 4 }}>Custom team name (optional)</div>
            </div>
          </div>
          <button onClick={handleSaveProfile} disabled={savingProfile || !displayName.trim()}
            style={{ background: !displayName.trim() ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {savingProfile ? "Saving..." : "Save Profile"}
          </button>
        </div>
      </div>

      {/* Change email */}
      <div style={{ ...CARD, marginBottom: 20 }}>
        <div style={{ background: "#000", padding: "12px 20px" }}>
          <span style={BAR_LABEL}>Change Email</span>
        </div>
        <div style={{ padding: 20 }}>
          {emailMsg && <div style={{ background: "#DBEAFE", border: "0.5px solid #BFDBFE", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#1d4ed8", fontWeight: 600 }}>{emailMsg}</div>}
          {emailError && <div style={{ background: "#FEE2E2", border: "0.5px solid #FECACA", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#991B1B", fontWeight: 600 }}>{emailError}</div>}
          <div style={{ fontSize: 12, color: C.g5, marginBottom: 12 }}>Current email: <strong style={{ color: "#000" }}>{owner.email || "unknown"}</strong></div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 400 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>New Email Address</label>
              <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)}
                placeholder="new@email.com..."
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
              <div style={{ fontSize: 11, color: C.g5, marginTop: 4 }}>A confirmation link will be sent to the new address.</div>
            </div>
            <button onClick={handleChangeEmail} disabled={savingEmail || !newEmail}
              style={{ background: !newEmail ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", alignSelf: "flex-start" }}>
              {savingEmail ? "Sending..." : "Update Email"}
            </button>
          </div>
        </div>
      </div>

      {/* Change password */}
      <div style={CARD}>
        <div style={{ background: "#000", padding: "12px 20px" }}>
          <span style={BAR_LABEL}>Change Password</span>
        </div>
        <div style={{ padding: 20 }}>
          {pwMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 700 }}>{pwMsg}</div>}
          {pwError && <div style={{ background: "#FEE2E2", border: "0.5px solid #FECACA", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#991B1B", fontWeight: 600 }}>{pwError}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 400 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>New Password</label>
              <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)}
                placeholder="Min 6 characters..."
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Confirm New Password</label>
              <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)}
                placeholder="Repeat new password..."
                style={{ width: "100%", border: "1px solid #E8E8E8", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", outline: "none" }} />
            </div>
            <button onClick={handleChangePw} disabled={savingPw || !newPw || !confirmPw}
              style={{ background: (!newPw||!confirmPw) ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", alignSelf: "flex-start" }}>
              {savingPw ? "Updating..." : "Update Password"}
            </button>
          </div>
        </div>
      </div>

      {/* Team Color */}
      <div style={{ ...CARD, marginTop: 20 }}>
        <div style={{ background: teamColor, padding: "12px 20px", display: "flex", alignItems: "center", gap: 12, transition: "background 0.2s" }}>
          <div style={{ width: 40, height: 40, borderRadius: "50%", background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 18, color: "#fff" }}>
            {(owner.name||"?")[0].toUpperCase()}
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: "#fff" }}>{owner.name}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)" }}>Preview of your team color</div>
          </div>
        </div>
        <div style={{ padding: 20 }}>
          {colorMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "8px 14px", marginBottom: 14, fontSize: 13, color: "#166534", fontWeight: 700 }}>{colorMsg}</div>}

          <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>NBA team colors</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
            {NBA_COLORS.map(c => (
              <div key={c} onClick={() => setTeamColor(c)}
                style={{ width: 26, height: 26, borderRadius: "50%", background: c, cursor: "pointer", border: teamColor === c ? "3px solid #000" : "1px solid rgba(0,0,0,0.1)", flexShrink: 0, transition: "border 0.1s" }} />
            ))}
          </div>

          <div style={{ fontSize: 11, fontWeight: 700, color: C.g5, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Bold</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
            {BOLD_COLORS.map(c => (
              <div key={c} onClick={() => setTeamColor(c)}
                style={{ width: 26, height: 26, borderRadius: "50%", background: c, cursor: "pointer", border: teamColor === c ? "3px solid #000" : "1px solid rgba(0,0,0,0.1)", flexShrink: 0, transition: "border 0.1s" }} />
            ))}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <label style={{ fontSize: 13, color: C.g5, whiteSpace: "nowrap" }}>Custom hex</label>
            <input value={teamColor} onChange={e => setTeamColor(e.target.value)}
              placeholder="#000000" maxLength={7}
              style={{ fontFamily: "monospace", fontSize: 13, padding: "6px 10px", border: "1px solid #E8E8E8", borderRadius: 8, outline: "none", width: 110 }} />
            <div style={{ width: 28, height: 28, borderRadius: 8, background: teamColor, border: "1px solid #E8E8E8", flexShrink: 0 }} />
          </div>

          <button onClick={handleSaveColor} disabled={savingColor}
            style={{ background: "#000", color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {savingColor ? "Saving..." : "Save Color"}
          </button>
        </div>
      </div>
    </PageShell>
  );
}


function App() {
  const [page, setPage] = useState("Standings");
  const [rosterTeam, setRosterTeam] = useState("jake");
  const [draftPicks, setDraftPicks] = useState(null);
  const [draftTrades, setDraftTrades] = useState([]);
  const [overrides, setOverrides] = useState([]);
  const [owner, setOwner] = useState(() => {
    try { return JSON.parse(localStorage.getItem("jl_owner")); } catch(e) { return null; }
  });

  const handleLogin = (ownerData) => setOwner(ownerData);
  const handleOwnerUpdate = (updated) => {
    setOwner(updated);
    if (updated.team_color && updated.team_id) {
      setTeamColors(prev => ({ ...prev, [updated.team_id]: updated.team_color }));
    }
  };
  const handleLogout = async () => { await sbSignOut(); setOwner(null); setPage("Standings"); };
  const [awardOverrides, setAwardOverrides] = useState([]);
  const [pendingTradeCount, setPendingTradeCount] = useState(0);

  const [teamColors, setTeamColors] = useState({});

  const refreshOverrides = () => {
    sbGetTrades().then(data => {
      const pending = (Array.isArray(data) ? data : []).filter(t =>
        t.status === "pending" && t.season === 4 && t.to_team === (owner?.team_id)
      );
      setPendingTradeCount(pending.length);
    });
    return Promise.all([
      sbGetRosterOverrides(4).then(data => setOverrides(data)),
      sbGetAwards(4).then(data => setAwardOverrides(data)),
      sbGetTeamColors().then(data => {
        const map = {};
        (data || []).forEach(o => { if (o.team_id && o.team_color) map[o.team_id] = o.team_color; });
        setTeamColors(map);
      }),
    ]);
  };

  useEffect(() => {
    sbGetRosterOverrides(4).then(data => setOverrides(data));
    sbGetAwards(4).then(data => setAwardOverrides(data));
    sbGetTeamColors().then(data => {
      const map = {};
      (data || []).forEach(o => { if (o.team_id && o.team_color) map[o.team_id] = o.team_color; });
      setTeamColors(map);
    });
  }, []);

  if (!owner) return <LoginPage onLogin={handleLogin} />;
  const baseTeams = applyRosterOverrides(overrides);
  const liveTeams = baseTeams.map(t => {
    if (teamColors[t.id]) return { ...t, color: teamColors[t.id] };
    if (owner && owner.team_id === t.id && owner.team_color) return { ...t, color: owner.team_color };
    return t;
  });
  const mergedAwards = [
    ...AWARDS.filter(a => !awardOverrides.some(o => o.player === a.player && o.award === a.award && o.season === 4)),
    ...awardOverrides.map(o => ({ player: o.player, team: o.team_id, award: o.award, place: o.place, pts: o.pts })),
  ];
  const liveAwards = applyAwardOverrides(overrides, mergedAwards);

  return (
    <>
      <style>{"* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #F5F5F5; font-family: Inter, sans-serif; overflow-x: hidden; } button { font-family: Inter, sans-serif; } input, select { font-size: 16px; }"}</style>
      <Nav page={page} setPage={setPage} owner={owner} onLogout={handleLogout} pendingTrades={pendingTradeCount} />
      {page === "Standings" && <StandingsPage onSelectTeam={(id) => { setRosterTeam(id); setPage("Rosters"); }} liveTeams={liveTeams} liveAwards={liveAwards} />}
      {page === "Rosters" && <RostersPage liveTeams={liveTeams} liveAwards={liveAwards} draftPicks={draftPicks} draftTrades={draftTrades} initialTeam={rosterTeam} owner={owner} onRosterChange={refreshOverrides} />}
      {page === "Trades" && <TradesPage liveTeams={liveTeams} owner={owner} onTradeAccepted={refreshOverrides} />}
      {page === "Available Players" && <FreeAgentsPage owner={owner} liveTeams={liveTeams} onRosterChange={refreshOverrides} />}
      {page === "FA Coaches" && <FACoachesPage owner={owner} liveTeams={liveTeams} onRosterChange={refreshOverrides} liveAwards={liveAwards} />}
      {page === "Scoring" && <ScoringPage liveAwards={liveAwards} />}
      {page === "Top 3 Kyrie's" && <Top3KyriesPage owner={owner} />}
      {page === "Draft" && <DraftPage draftPicks={draftPicks} setDraftPicks={setDraftPicks} draftTrades={draftTrades} setDraftTrades={setDraftTrades} liveTeams={liveTeams} liveAwards={liveAwards} />}
      {page === "History" && <LeagueHistoryPage liveTeams={liveTeams} />}
      {page === "Schedule" && <SchedulePage />}
      {page === "Odds" && <OddsPage />}
      {page === "Admin" && <AdminPage owner={owner} liveTeams={liveTeams} liveAwards={liveAwards} onAwardChange={refreshOverrides} />}
      {page === "Profile" && <ProfilePage owner={owner} onOwnerUpdate={handleOwnerUpdate} onRosterChange={refreshOverrides} liveTeams={liveTeams} />}
      {!["Standings","Rosters","Trades","Available Players","FA Coaches","Scoring","Top 3 Kyrie's","Draft","History","Schedule","Odds"].includes(page) && (
        <div style={{ maxWidth: 980, margin: "0 auto", padding: "40px 20px", textAlign: "center", color: "#888" }}>
          <h2>{page} coming soon</h2>
        </div>
      )}
      <div style={{ background: "#000", color: "#555", textAlign: "center", padding: "14px", fontSize: 11, fontWeight: 600, textTransform: "uppercase" }}>
        Jones League Dynasty League - Season 4 - 2026-27
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
  window.addEventListener("load", function() {
    var logoSVG = "<svg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'><defs><clipPath id='bc'><circle cx='40' cy='40' r='37'/></clipPath><mask id='tm'><rect width='80' height='80' fill='white'/><rect x='22' y='28' width='36' height='22' fill='black'/></mask></defs><circle cx='40' cy='40' r='38' fill='#C8102E'/><path d='M28,2.5 Q20,40 28,77.5 Q32,79 36,79.5 Q40,80 44,79.5 Q48,79 52,77.5 Q60,40 52,2.5 Q48,1 44,0.5 Q40,0 36,0.5 Q32,1 28,2.5Z' fill='#1D428A'/><g clip-path='url(#bc)'><line x1='40' y1='0' x2='40' y2='28' stroke='white' stroke-width='2' opacity='0.7'/><line x1='40' y1='50' x2='40' y2='80' stroke='white' stroke-width='2' opacity='0.7'/><path d='M2,40 Q40,34 78,40' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' opacity='0.8' mask='url(#tm)'/></g><path d='M10,4 Q22,40 10,76' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' clip-path='url(#bc)'/><path d='M70,4 Q58,40 70,76' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' clip-path='url(#bc)'/><text x='40' y='50' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-size='22' font-weight='900' fill='white'>JL</text></svg>";
    function tryInject() {
      var navSlot = document.getElementById("jl-logo-slot");
      var loginSlot = document.getElementById("login-logo");
      if (navSlot) navSlot.innerHTML = logoSVG;
      if (loginSlot) loginSlot.innerHTML = logoSVG;
      if (!navSlot && !loginSlot) setTimeout(tryInject, 200);
    }
    setTimeout(tryInject, 500);
  });
  </script>
</body>
