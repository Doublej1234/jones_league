async function sbFetch(path, options = {}) {
  const token = localStorage.getItem("jl_token");
  const headers = {
    "apikey": SUPABASE_KEY,
    "Content-Type": "application/json",
    "Authorization": "Bearer " + (token || SUPABASE_KEY),
    ...(options.headers || {})
  };
  const res = await fetch(SUPABASE_URL + path, { ...options, headers });
  if (res.status === 204 || res.headers.get("content-length") === "0") return { data: null, status: res.status };
  const d = await res.json().catch(() => ({}));
  return { data: d, ok: res.ok, status: res.status };
}

async function sbSignIn(email, password) {
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  return res.json();
}

async function sbSignOut() {
  const token = localStorage.getItem("jl_token");
  await fetch(SUPABASE_URL + "/auth/v1/logout", {
    method: "POST", headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + token }
  });
  localStorage.removeItem("jl_token");
  localStorage.removeItem("jl_user_id");
  localStorage.removeItem("jl_owner");
}

async function sbGetTeamColors() {
  const { data } = await sbFetch("/rest/v1/owners?select=team_id,team_color");
  return Array.isArray(data) ? data : [];
}


async function sbGetOwner(userId) {
  const { data } = await sbFetch("/rest/v1/owners?id=eq." + userId + "&select=*");
  return Array.isArray(data) && data.length > 0 ? data[0] : null;
}

async function sbGetTrades() {
  const { data } = await sbFetch("/rest/v1/trades?select=*&order=created_at.desc");
  return Array.isArray(data) ? data : [];
}

async function sbInsertTrade(trade) {
  return sbFetch("/rest/v1/trades", {
    method: "POST", headers: { "Prefer": "return=representation" },
    body: JSON.stringify(trade)
  });
}

async function sbUpdateTrade(id, updates) {
  return sbFetch("/rest/v1/trades?id=eq." + id, {
    method: "PATCH", headers: { "Prefer": "return=representation" },
    body: JSON.stringify(updates)
  });
}

async function sbDeleteObservation(id) {
  return sbFetch("/rest/v1/observations?id=eq." + id, { method: "DELETE" });

async function sbGetKyrieVotes(season = 4) {
  const { data } = await sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&select=*");
  return Array.isArray(data) ? data : [];
}

async function sbUpsertKyrieVote(season, voter_team, rank1, rank2, rank3) {
  const existing = await sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&voter_team=eq." + voter_team);
  if (existing.data && existing.data.length > 0) {
    return sbFetch("/rest/v1/kyrie_votes?season=eq." + season + "&voter_team=eq." + voter_team, {
      method: "PATCH", headers: { "Prefer": "return=representation" },
      body: JSON.stringify({ rank1, rank2, rank3, submitted_at: new Date().toISOString() })
    });
  }
  return sbFetch("/rest/v1/kyrie_votes", {
    method: "POST", headers: { "Prefer": "return=representation" },
    body: JSON.stringify({ season, voter_team, rank1, rank2, rank3 })
  });
}

async function sbUpdateOwner(id, updates) {

}

function applyRosterOverrides(overrides) {
  const teamRosters = {};
  const teamCoaches = {};
  const teamAsstCoaches = {};
  TEAMS.forEach(t => {
    teamRosters[t.id] = [...t.roster];
    teamCoaches[t.id] = t.coach;
    teamAsstCoaches[t.id] = t.asstCoach;
  });
  overrides.forEach(o => {
    const isCoach = o.round === 200;
    const isAsstCoach = o.round === 300;
    if (isCoach) {
      if (o.from_team !== "FA" && teamCoaches[o.from_team] === o.player) teamCoaches[o.from_team] = null;
      if (o.to_team !== "FA") teamCoaches[o.to_team] = o.player;
    } else if (isAsstCoach) {
      if (o.from_team !== "FA" && teamAsstCoaches[o.from_team] === o.player) teamAsstCoaches[o.from_team] = null;
      if (o.to_team !== "FA") teamAsstCoaches[o.to_team] = o.player;
    } else {
      if (o.from_team !== "FA" && teamRosters[o.from_team]) {
        teamRosters[o.from_team] = teamRosters[o.from_team].filter(p => p !== o.player);
      }
      if (o.to_team !== "FA" && teamRosters[o.to_team]) {
        if (!teamRosters[o.to_team].includes(o.player)) {
          teamRosters[o.to_team] = [...teamRosters[o.to_team], o.player];
        }
      }
    }
  });
  return TEAMS.map(t => ({ ...t, roster: teamRosters[t.id] || t.roster, coach: teamCoaches[t.id], asstCoach: teamAsstCoaches[t.id] }));
}

function applyAwardOverrides(overrides, awards) {
  const base = awards || AWARDS;
  return base.map(a => {
    const override = overrides.find(o => o.player === a.player && o.from_team === a.team);
    if (override) return { ...a, team: override.to_team };
    return a;
  });
}

function useIsMobile() {
  const [mob, setMob] = useState(typeof window !== "undefined" ? window.innerWidth < 640 : false);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth < 640);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

function calcTeamScores(awards) {
  const s = {}; TEAMS.forEach(t => s[t.id] = 0);
  const twoWaySet = {};
  TEAMS.forEach(t => t.twoWay.forEach(p => twoWaySet[p] = t.id));
  const coachTeam = {}; TEAMS.forEach(t => coachTeam[t.coach] = t.id);
  awards.forEach(a => {
    let teamId = a.team;
    if (!teamId && a.award === "COY" && coachTeam[a.player]) teamId = coachTeam[a.player];
    if (teamId && s[teamId] !== undefined && a.pts > 0) {
      const mult = twoWaySet[a.player] === teamId ? 0.5 : 1;
      s[teamId] += a.pts * mult;
    }
  });
  return s;
}

function getCatEntries(cat, awards) {
  if (!cat.awardKey) return [];
  const keys = cat.awardKey === "INDIVIDUAL"
    ? ["CONF_MVP","CLUTCH","SCORING_TITLE","SIXTH_MAN","MIP","NBA2K"]
    : cat.awardKey === "SKILLS"
    ? ["DUNK_CONTEST","THREE_PT_CONTEST"]
    : [cat.awardKey];
  return awards.filter(a => keys.includes(a.award) && a.pts > 0);
}

function getCatStatus(cat, awards) {
  const entries = getCatEntries(cat, awards);
  if (entries.length === 0) return "pending";
  const minEntries = { MVP:5, ALL_NBA:15, ALL_STAR:10, ROY:3, DPOY:3, COY:3, ALL_DEFENSE:10, ALL_ROOKIE:4, SOY:3, COACH_PLAYOFF:3, STAT_LEADERS:2, NBA2K:1, KYRIE:3, INDIVIDUAL:4, SKILLS:2 };
  const min = minEntries[cat.awardKey] || 1;
  if (entries.length >= min) return "awarded";
  return "partial";
}

function PlayerScoresPage() {
  const twoWaySet = {};
  TEAMS.forEach(t => t.twoWay.forEach(p => twoWaySet[p] = t.id));
  const coachTeam = {}; TEAMS.forEach(t => coachTeam[t.coach] = t.id);

  const playerScores = {};
  AWARDS.forEach(a => {
    if (!a.team || a.pts === 0) return;
    const isTW = twoWaySet[a.player] === a.team;
    const scored = isTW ? a.pts * 0.5 : a.pts;
    if (!playerScores[a.player]) playerScores[a.player] = { player: a.player, team: a.team, total: 0, fullTotal: 0, isTwoWay: isTW, isCoach: false, awards: [] };
    playerScores[a.player].total += scored;
    playerScores[a.player].fullTotal += a.pts;
    playerScores[a.player].awards.push({ label: awardLabel(a.award), place: a.place, pts: a.pts, scored });
  });

  AWARDS.forEach(a => {
    if ((a.award !== "COY" && a.award !== "COACH_PLAYOFF") || a.pts === 0) return;
    const teamId = a.team || coachTeam[a.player];
    if (!teamId) return;
    const key = "coach:" + a.player;
    if (!playerScores[key]) playerScores[key] = { player: a.player, team: teamId, total: 0, fullTotal: 0, isTwoWay: false, isCoach: true, awards: [] };
    playerScores[key].total += a.pts;
    playerScores[key].fullTotal += a.pts;
    playerScores[key].awards.push({ label: awardLabel(a.award), place: a.place, pts: a.pts, scored: a.pts });
  });

  const team = teams.find(t => t.id === selected) || teams[0];

    return sum + (s ? parseFloat(s.replace(/[$M]/g, '')) : 0);

  const buildPicksForTeam = (teamObj) => {
    if (!draftPicks) return null;
    const r1 = draftPicks.map((t, i) => ({ round: 1, slot: i + 1, originalOwner: t, currentOwner: t }));
    const r2 = [...draftPicks].reverse().map((t, i) => ({ round: 2, slot: i + 1, originalOwner: t, currentOwner: t }));
    let allPicks = [...r1, ...r2];
    (draftTrades || []).forEach(tr => {
      allPicks = allPicks.map(p => {
        const key = "R" + p.round + "-" + p.slot;
        if (key === tr.pick && p.currentOwner.name === tr.from) {
          const toTeam = TEAMS.find(t => t.name === tr.to);
          return { ...p, currentOwner: toTeam, traded: true, tradeNote: tr.note };

        return p;

              const bPts = awards.filter(x => x.player === b && x.team === team.id).reduce((s, x) => s + x.pts, 0);

                  <span style={{ background: team.color + "15", color: team.color, fontWeight: 800, fontSize: 20, padding: "6px 16px", borderRadius: 12, border: "1px solid " + team.color + "30" }}>+{sim2k.pts} pts</span></>
                : <div style={{ color: C.g5, fontSize: 13, fontStyle: "italic" }}>No 2K result for this team.</div>}

      {/* Draft Picks */}
      <div style={{ marginTop: 20, ...CARD }}>
        <div style={{ background: "#000", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, fontSize: 13, color: "#fff", letterSpacing: 1, textTransform: "uppercase" }}>  Draft Picks & Swaps</span>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Jones League   All Years</span>
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ ...TH, width: 100 }}>YEAR</th>
              <th style={TH}>1ST ROUND</th>
              <th style={TH}>2ND ROUND</th>
            </tr>
          </thead>
          <tbody>
            {(DRAFT_HISTORY[team.id] || []).map((row, i) => {
              const isCurrentYear = row.year === 3;
              const liveR1 = isCurrentYear && teamPicks?.find(p => p.round === 1);
              const liveR2 = isCurrentYear && teamPicks?.find(p => p.round === 2);
              const r1Display = isCurrentYear && liveR1 ? (liveR1.traded ? "Traded   " + liveR1.currentOwner.name : "Pick " + liveR1.slot) : row.r1;
              const r2Display = isCurrentYear && liveR2 ? (liveR2.traded ? "Traded   " + liveR2.currentOwner.name : "Pick " + liveR2.slot) : row.r2;
              return (
                <tr key={row.year}>
                  <td style={{ ...TD(i), fontWeight: 700, color: isCurrentYear ? team.color : C.g7 }}>
                    Year {row.year}
                    {isCurrentYear && <span style={{ marginLeft: 6, fontSize: 9, background: C.red, color: "#fff", padding: "1px 5px", borderRadius: 3, fontWeight: 700, verticalAlign: "middle" }}>NOW</span>}
                  </td>
                  <td style={TD(i)}>
                    {row.r1 === "Own" && !liveR1
                      ? <span style={{ color: C.g5, fontSize: 13 }}>Own</span>
                      : <span style={{ fontSize: 13, fontWeight: 600 }}>{r1Display}</span>}
                  </td>
                  <td style={TD(i)}>
                    {row.r2 === "Own" && !liveR2
                      ? <span style={{ color: C.g5, fontSize: 13 }}>Own</span>
                      : <span style={{ fontSize: 13, fontWeight: 600 }}>{r2Display}</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </PageShell>
  );
}

const FANT_PTS = {};


function FreeAgentsPage({ owner, liveTeams, onRosterChange }) {
  const mob = useIsMobile();
  const [search, setSearch] = useState("");
  const [posFilter, setPosFilter] = useState("ALL");
  const [sortKey, setSortKey] = useState("pts");
  const [sortDir, setSortDir] = useState("desc");
  const [adding, setAdding] = useState(null);
  const [actionMsg, setActionMsg] = useState("");
  const [apiPlayers, setApiPlayers] = useState([]);
  const [apiLoading, setApiLoading] = useState(true);
  const [apiError, setApiError] = useState(false);

  const teams = liveTeams || TEAMS;
  const allRostered = new Set(teams.flatMap(t => [...t.roster, t.coach, t.asstCoach].filter(Boolean)));

  // Map API field names to our field names
  const mapPlayer = (p) => ({
    name: p.playerName,
    team: p.team,
    pos: p.position || "",
    gp: p.games || 0,
    mpg: p.minutesPg || 0,
    pts: p.points || 0,
    reb: p.totalRb || 0,
    ast: p.assists || 0,
    stl: p.steals || 0,
    blk: p.blocks || 0,
    tov: p.turnovers || 0,
    pf: p.personalFouls || 0,
    fg_pct: p.fieldPercent || 0,
    fg3_pct: p.threePercent || 0,
    ft_pct: p.ftPercent || 0,
    ts_pct: null,
    plus_minus: null,
    fantPts: FANT_PTS[p.playerName] || 0,  // uses API player name
  });

  const fetchPlayers = async () => {
    setApiLoading(true);
    setApiError(false);
    try {
      // Try multiple pages from nbaapi.com
      const pages = [1, 2, 3, 4, 5];
      const results = await Promise.all(pages.map(page =>
        fetch("https://api.server.nbaapi.com/api/playeraverages?season=2025&page=" + page + "&pageSize=50&sortBy=points&ascending=false", {
          headers: { "Accept": "application/json", "Origin": "https://jonesleaguebasketball.vercel.app" }
        })
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .catch(() => ({ data: [] }))
      ));
      const all = results.flatMap(r => Array.isArray(r.data) ? r.data : []);
      if (all.length > 0) {
        setApiPlayers(all.map(mapPlayer));
        setApiLoading(false);
        return;
      }
      throw new Error("No data");
    } catch(e) {
      // Fallback to hardcoded
      setApiPlayers(FA_PLAYERS);
      setApiError(true);
      setApiLoading(false);
    }
  };

  useEffect(() => { fetchPlayers(); }, []);

  const positions = ["ALL","PG","SG","SF","PF","C"];
  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === "desc" ? "asc" : "desc");
    else { setSortKey(key); setSortDir("desc"); }
  };

  const filtered = apiPlayers
    .filter(p => !allRostered.has(p.name))
    .filter(p => posFilter === "ALL" || p.pos === posFilter)
    .filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase()) || (p.team||"").toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      const av = a[sortKey] ?? -999, bv = b[sortKey] ?? -999;
      return sortDir === "desc" ? bv - av : av - bv;
    });

  const handleAdd = async (playerName) => {
    if (!owner) return;
    setAdding(playerName);
    await sbInsertRosterOverride({ player: playerName, from_team: "FA", to_team: owner.team_id, season: 4, trade_id: null });
    setActionMsg(playerName + " added to your roster!");
    setAdding(null);
    if (onRosterChange) await onRosterChange();
    setTimeout(() => setActionMsg(""), 4000);
  };

  const arrow = (key) => sortKey === key ? (sortDir === "desc" ? " v" : " ^") : "";

  return (
    <PageShell title="Available Players" subtitle={"2026-27 - " + filtered.length + " available players - Click column to sort"}>
      {actionMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 700 }}>{actionMsg}</div>}
      {apiError && <div style={{ background: "#F5F5F5", border: "0.5px solid #E8E8E8", borderRadius: 8, padding: "8px 16px", marginBottom: 16, fontSize: 11, color: C.g5 }}>Showing cached stats · <span style={{ cursor: "pointer", color: C.blue, textDecoration: "underline" }} onClick={fetchPlayers}>Try refresh</span></div>}

      {/* Filters */}
      <div style={{ display: "flex", gap: 10, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search players or teams..."
          style={{ flex: 1, minWidth: 160, border: "1px solid #E8E8E8", padding: "8px 12px", borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none" }} />
        {positions.map(p => (
          <button key={p} onClick={() => setPosFilter(p)} style={{
            background: posFilter === p ? "#000" : "#fff", color: posFilter === p ? "#fff" : C.g5,
            border: "1px solid " + (posFilter === p ? "#000" : "#E8E8E8"), borderRadius: 8,
            padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
          }}>{p}</button>
        ))}
        <button onClick={fetchPlayers} style={{ background: "#fff", border: "1px solid #E8E8E8", borderRadius: 8, padding: "6px 14px", fontSize: 12, color: C.g5, cursor: "pointer", fontFamily: "inherit" }}>
          {apiLoading ? "Loading..." : "Refresh"}
        </button>
      </div>

      {apiLoading ? (
        <div style={{ ...CARD, padding: 48, textAlign: "center", color: C.g5 }}>
          <div style={{ fontSize: 24, marginBottom: 12 }}>Loading live player stats...</div>
          <div style={{ fontSize: 13 }}>Fetching 2026-27 season averages</div>
        </div>
      ) : (
        <div style={{ ...CARD, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 900 }}>
            <thead>
              <tr>
                <th style={{ ...TH, position: "sticky", left: 0, background: "#F5F5F5", zIndex: 2, minWidth: 200 }}>PLAYER</th>
                <th style={{ ...TH, width: 48 }}>TEAM</th>
                <th style={{ ...TH, width: 40 }}>POS</th>
                <th style={{ ...TH, width: 44, textAlign: "center" }}>GP</th>
                {STAT_COLS.map(col => (
                  <th key={col.key} title={col.title} onClick={() => handleSort(col.key)} style={{
                    ...TH, cursor: "pointer", userSelect: "none", textAlign: "right",
                    paddingRight: 12, minWidth: 58,
                    background: sortKey === col.key ? "#dce7f8" : "#F5F5F5",
                    color: sortKey === col.key ? C.blue : C.g5,
                  }}>{col.label}{arrow(col.key)}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((p, i) => (
                <tr key={p.name}>
                  <td style={{ ...TD(i), position: "sticky", left: 0, zIndex: 1, fontWeight: 600, minWidth: 200, background: i % 2 === 0 ? "#fff" : "#F5F5F5" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span>{p.name}</span>
                      {p.fantPts > 0 && <span style={{ fontSize: 10, background: "#fef3c7", color: "#92400e", padding: "2px 6px", borderRadius: 10, fontWeight: 700 }}>{p.fantPts}pts</span>}
                      {owner && <button onClick={() => handleAdd(p.name)} disabled={adding === p.name}
                        style={{ marginLeft: "auto", background: adding === p.name ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0 }}>
                        {adding === p.name ? "..." : "+ Add"}
                      </button>}
                    </div>
                  </td>
                  <td style={{ ...TD(i), fontSize: 12, fontWeight: 600, color: C.g5 }}>{p.team}</td>
                  <td style={{ ...TD(i), fontSize: 12, color: C.g5 }}>{p.pos}</td>
                  <td style={{ ...TD(i), fontSize: 12, color: C.g5, textAlign: "center" }}>{p.gp}</td>
                  {STAT_COLS.map(col => {
                    const val = p[col.key];
                    const disp = val == null ? "-" : col.key.includes("pct") ? (val * 100).toFixed(1) + "%" : typeof val === "number" ? val.toFixed(1) : val;
                    return (
                      <td key={col.key} style={{ ...TD(i), textAlign: "right", paddingRight: 12, fontSize: 12,
                        fontWeight: sortKey === col.key ? 700 : 400,
                        color: sortKey === col.key ? C.blue : (val == null ? C.g3 : "#000"),
                      }}>{disp}</td>
                    );
                  })}
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan={5 + STAT_COLS.length} style={{ padding: 32, textAlign: "center", color: C.g5 }}>No players found.</td></tr>
              )}
            </tbody>
          </table>
        </div>
      )}
    </PageShell>
  );
}


function FACoachesPage({ owner, liveTeams, onRosterChange, liveAwards }) {
  const [search, setSearch] = useState("");
  const [confFilter, setConfFilter] = useState("ALL");
  const [sortKey, setSortKey] = useState("record");
  const [sortDir, setSortDir] = useState("desc");
  const [adding, setAdding] = useState(null);
  const [actionMsg, setActionMsg] = useState("");

  const teams = liveTeams || TEAMS;
  const [draftedCoaches, setDraftedCoaches] = useState(new Set());

  useEffect(() => {
    sbGetDraftPicks(4).then(picks => {
      const coachRounds = new Set([200, 201, 300, 301]);
      const names = (picks || []).filter(p => coachRounds.has(p.round)).map(p => p.player);
      setDraftedCoaches(new Set(names));
    });
  }, []);

  const awards = liveAwards || AWARDS;
  const coachPts = (name) => awards.filter(a => a.player === name && a.pts > 0).reduce((s,a) => s+a.pts, 0);
  const rosteredCoaches = new Set([
    ...teams.flatMap(t => [t.coach, t.asstCoach].filter(Boolean)),
    ...draftedCoaches,
  ]);
  const available = ALL_NBA_COACHES.filter(c => !rosteredCoaches.has(c.name));
  const getWins = (c) => parseInt(c.record.split("-")[0]) || 0;
  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === "desc" ? "asc" : "desc");
    else { setSortKey(key); setSortDir("desc"); }
  };
  const filtered = available
    .filter(c => confFilter === "ALL" || c.conf === confFilter)
    .filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.team.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      if (sortKey === "record") return sortDir === "desc" ? getWins(b) - getWins(a) : getWins(a) - getWins(b);
      if (sortKey === "titles") return sortDir === "desc" ? b.titles - a.titles : a.titles - b.titles;
      if (sortKey === "coy") return sortDir === "desc" ? b.coy - a.coy : a.coy - b.coy;
      if (sortKey === "exp") return sortDir === "desc" ? b.exp - a.exp : a.exp - b.exp;
      return sortDir === "asc" ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
    });
  const arrow = (key) => sortKey === key ? (sortDir === "desc" ? "  " : "  ") : "";
  const confColor = (conf) => conf === "East" ? C.blue : C.red;

  const handleAdd = async (coachName) => {
    if (!owner) return;
    setAdding(coachName);
    const coachRound = !liveTeams?.find(t => t.id === owner.team_id)?.coach ? 200 : 300;
    await sbInsertRosterOverride({ player: coachName, from_team: "FA", to_team: owner.team_id, season: 4, trade_id: null, round: coachRound });
    setActionMsg(coachName + " added to your roster!");
    setAdding(null);
    if (onRosterChange) onRosterChange();
    setTimeout(() => setActionMsg(""), 4000);
  };

  return (
    <PageShell title="Free Agent Coaches" subtitle={"2025 26   " + filtered.length + " available head coaches not rostered in the Jones League"}>
      {actionMsg && <div style={{ background: "#DCFCE7", border: "0.5px solid #BBF7D0", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534", fontWeight: 700 }}>{actionMsg}</div>}
      <div style={{ display: "flex", gap: 10, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
        <input placeholder="Search coach or team " value={search} onChange={e => setSearch(e.target.value)}
          style={{ border: "1.5px solid #D0D0D0", padding: "8px 14px", borderRadius: 6, fontSize: 14, fontFamily: "inherit", width: 220, outline: "none" }} />
        <div style={{ display: "flex", gap: 6 }}>
          {["ALL","East","West"].map(cf => (
            <button key={cf} onClick={() => setConfFilter(cf)} style={PILL(confFilter === cf)}>{cf}</button>
          ))}
        </div>
        <span style={{ fontSize: 13, color: C.g5 }}>{filtered.length} coaches</span>
      </div>
      <div style={CARD}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ ...TH, minWidth: 180 }}>COACH</th>
              <th style={{ ...TH, width: 56 }}>TEAM</th>
              <th style={{ ...TH, width: 56 }}>CONF</th>
              <th onClick={() => handleSort("record")} style={{ ...TH, cursor: "pointer", color: sortKey==="record"?C.blue:C.g5, background: sortKey==="record"?"#dce7f8":"#F5F5F5" }}>W-L{arrow("record")}</th>
              <th onClick={() => handleSort("titles")} style={{ ...TH, cursor: "pointer", color: sortKey==="titles"?C.blue:C.g5, background: sortKey==="titles"?"#dce7f8":"#F5F5F5" }}> {arrow("titles")}</th>
              <th onClick={() => handleSort("coy")} style={{ ...TH, cursor: "pointer", color: sortKey==="coy"?C.blue:C.g5, background: sortKey==="coy"?"#dce7f8":"#F5F5F5" }}>COY{arrow("coy")}</th>
              <th onClick={() => handleSort("exp")} style={{ ...TH, cursor: "pointer", color: sortKey==="exp"?C.blue:C.g5, background: sortKey==="exp"?"#dce7f8":"#F5F5F5" }}>YRS{arrow("exp")}</th>
              <th style={{ ...TH, minWidth: 200 }}>NOTE</th>
              <th style={{ ...TH, width: 80, textAlign: "right", color: C.blue }}>FANT PTS</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((coach, i) => (
              <tr key={coach.name}>
                <td style={{ ...TD(i), fontWeight: 700 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span>{coach.name}</span>
                    {owner && <button onClick={() => handleAdd(coach.name)} disabled={adding === coach.name}
                      style={{ marginLeft: "auto", background: adding === coach.name ? C.g3 : "#000", color: "#fff", border: "none", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0 }}>
                      {adding === coach.name ? "..." : "+ Add"}
                    </button>}
                  </div>
                </td>
                <td style={{ ...TD(i), fontWeight: 700, fontSize: 12, color: C.g5 }}>{coach.team}</td>
                <td style={TD(i)}>
                  <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 10, background: confColor(coach.conf) + "15", color: confColor(coach.conf), border: "1px solid " + confColor(coach.conf) + "30" }}>{coach.conf}</span>
                </td>
                <td style={{ ...TD(i), fontWeight: sortKey==="record"?700:400, color: sortKey==="record"?C.blue:C.black, background: sortKey==="record"?(i%2===0?"#f0f6ff":"#e8f0fc"):(i%2===0?"#fff":"#F5F5F5") }}>{coach.record}</td>
                <td style={{ ...TD(i), textAlign: "center", fontWeight: 700, color: coach.titles>0?"#92400e":C.g3 }}>{coach.titles>0?coach.titles:" "}</td>
                <td style={{ ...TD(i), textAlign: "center", fontWeight: 700, color: coach.coy>0?C.blue:C.g3 }}>{coach.coy>0?coach.coy:" "}</td>
                <td style={{ ...TD(i), textAlign: "center", color: C.g7 }}>{coach.exp}</td>
                <td style={{ ...TD(i), fontSize: 12, color: C.g5, fontStyle: "italic" }}>{coach.note}</td>
                <td style={{ ...TD(i), textAlign: "right" }}>
                  {coachPts(coach.name) > 0
                    ? <span style={{ background: "#fef3c7", color: "#92400e", fontWeight: 700, fontSize: 12, padding: "2px 8px", borderRadius: 10 }}>{coachPts(coach.name)}pts</span>
                    : <span style={{ color: C.g3, fontSize: 12 }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p style={{ fontSize: 12, color: C.g5, marginTop: 12 }}>Showing {filtered.length} available coaches · Click headers to sort</p>
    </PageShell>
  );
}

  const allAvailablePlayers = [...new Set([

  ])].sort();

  const handleAddDraftPick = async (teamId, round, playerName) => {

    setSavingPick(null);
    setTimeout(() => setDraftMsg(""), 4000);
  };

    setWaiverMsg(waiverPlayer.trim() + " added to waiver log!");

    await loadDraftData();
    setSavingWaiver(false);
    setTimeout(() => setWaiverMsg(""), 4000);
  };

  const getDraftPick = (teamId, round) => sbDraftPicks.find(p => p.team_id === teamId && p.round === round);
  const standingsOrder = [...teams].sort((a, b) => (scores[a.id]||0) - (scores[b.id]||0));
  const lotteryTeams = standingsOrder.slice(0, 3);
  const fixed4 = standingsOrder[3];
  const fixed5 = standingsOrder[4];
  const LOTTERY_CHANCES = [50, 35, 15];
  const [spinning, setSpinning] = useState(false);
  const [tradeFrom, setTradeFrom] = useState("");
  const [tradeTo, setTradeTo] = useState("");
  const [tradePick, setTradePick] = useState("");
  const [tradeNote, setTradeNote] = useState("");
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const drawnRef = useRef(false);

  const segments = lotteryTeams.map((t, i) => ({
    team: t, pct: LOTTERY_CHANCES[i], color: t.color,
    startDeg: LOTTERY_CHANCES.slice(0, i).reduce((a, b) => a + b * 3.6, 0),
    sweepDeg: LOTTERY_CHANCES[i] * 3.6,
  }));

  const drawWheel = (angle = 0) => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cx = canvas.width/2, cy = canvas.height/2, r = cx - 10;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const rad = d => d * Math.PI / 180;
    segments.forEach(seg => {
      const start = rad(seg.startDeg + angle - 90);
      const end = rad(seg.startDeg + seg.sweepDeg + angle - 90);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
      ctx.fillStyle = seg.color; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      const mid = rad(seg.startDeg + seg.sweepDeg/2 + angle - 90);
      const lx = cx + r*0.65*Math.cos(mid), ly = cy + r*0.65*Math.sin(mid);
      ctx.fillStyle = "#fff"; ctx.font = "bold 13px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(seg.team.name + " " + seg.pct + "%", lx, ly);
    });
    ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill(); ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#111"; ctx.font = "bold 11px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("LOTTERY", cx, cy);
    ctx.beginPath(); ctx.moveTo(cx+r+8, cy); ctx.lineTo(cx+r-12, cy-10); ctx.lineTo(cx+r-12, cy+10); ctx.closePath(); ctx.fillStyle = "#C8102E"; ctx.fill();
  };

  if (!drawnRef.current) { drawnRef.current = true; setTimeout(() => drawWheel(0), 100); }

  const spinWheel = () => {
    if (spinning || picks) return;
    setSpinning(true);
    const roll = Math.random() * 100;
    let winnerIdx = roll < 50 ? 0 : roll < 85 ? 1 : 2;
    const targetSeg = segments[winnerIdx];
    const targetAngle = 360 - (targetSeg.startDeg + targetSeg.sweepDeg/2);
    const totalSpins = 5*360 + targetAngle;
    const duration = 4000;
    const start = performance.now();
    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      drawWheel((ease * totalSpins) % 360);
      if (t < 1) { animRef.current = requestAnimationFrame(animate); }
      else {
        setSpinning(false);
        const winner = lotteryTeams[winnerIdx];
        const remaining = lotteryTeams.filter((_, i) => i !== winnerIdx).sort(() => Math.random() - 0.5);
        setPicks([winner, remaining[0], remaining[1], fixed4, fixed5]);

        }
        return p;
      });
    });
    return all;
  };
  const allPicks = buildPickList();

  const handleTrade = () => {
    if (!tradeFrom || !tradeTo || !tradePick || tradeFrom === tradeTo) return;
    setTrades(prev => [...prev, { from:tradeFrom, to:tradeTo, pick:tradePick, note:tradeNote }]);
    setTradeFrom(""); setTradeTo(""); setTradePick(""); setTradeNote("");
  };

  const resetLottery = () => { setPicks(null); setTrades([]); setTimeout(() => drawWheel(0), 50); };

  const ss = { border:"1.5px solid #D0D0D0", background:"#fff", color:"#111", padding:"8px 12px", borderRadius:6, fontFamily:"inherit", fontSize:13, cursor:"pointer", width:"100%" };

  return (
    <PageShell title="Draft Lottery & Picks" subtitle="2026 Jones League Draft">
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 28, alignItems: "stretch" }}>
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ ...CARD, marginBottom: 16, display: "flex", flexDirection: "column", flex: 1 }}>
            <div style={{ ...BAR_HEADER, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={BAR_LABEL}>  Draft Lottery Wheel</span>
              {picks && <button onClick={resetLottery} style={{ background:"none", border:"1px solid #555", color:C.g5, padding:"3px 10px", borderRadius:4, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Reset</button>}
            </div>
            <div style={{ padding:20, display:"flex", flexDirection:"column", alignItems:"center", gap:16, flex: 1, justifyContent: "center" }}>
              <canvas ref={canvasRef} width={280} height={280} style={{ display:"block" }} />
              {!picks
                ? <button onClick={spinWheel} disabled={spinning} style={{ background:spinning?C.g3:C.red, color:"#fff", border:"none", padding:"12px 40px", borderRadius:6, fontWeight:800, fontSize:16, cursor:spinning?"not-allowed":"pointer", fontFamily:"inherit" }}>{spinning?"Spinning ":"  Spin Lottery"}</button>
                : <div style={{ textAlign:"center" }}><div style={{ fontWeight:800, fontSize:16 }}>  #1 Overall Pick:</div><div style={{ fontWeight:800, fontSize:22, color:picks[0].color, marginTop:4 }}>{picks[0].name}</div></div>}
            </div>
          </div>

        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={CARD}>
            <div style={BAR_HEADER}><span style={BAR_LABEL}>Lottery Odds</span></div>
            {lotteryTeams.map((t, i) => (
              <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", borderBottom:"1px solid #E8E8E8", background:i%2===0?"#fff":"#F5F5F5", borderLeft:"3px solid "+t.color }}>
                <span style={{ fontWeight:700, fontSize:14 }}>{t.name} <span style={{ fontSize:11, color:C.g5 }}>{i===0?"Last place":i===1?"3rd-to-last":"2nd-to-last"}</span></span>
                <span style={{ fontWeight:800, fontSize:16, color:t.color }}>{LOTTERY_CHANCES[i]}%</span>
              </div>
            ))}
            {[fixed4, fixed5].map((t, i) => (

          })
        )}
      </div>

    </PageShell>
  );
}

  const targetTeam = teams.find(t => t.id === toTeam);

    const data = await sbGetTrades();

    setLoading(false);
  };

  useEffect(() => { loadTrades(); }, []);

  const toggle = (arr, setArr, item) =>
    setArr(arr.includes(item) ? arr.filter(x => x !== item) : [...arr, item]);

  const handlePropose = async () => {
    if (!toTeam || (myPlayers.length === 0 && myPicks.length === 0)) return;
    setSubmitting(true);
    const offered = [...myPlayers, ...myPicks.map(p => "Pick: " + p)];
    const requested = [...theirPlayers, ...theirPicks.map(p => "Pick: " + p)];
    await sbInsertTrade({ from_team: owner.team_id, to_team: toTeam, offered_players: offered, requested_players: requested, status: "pending", note: note || null, season: 4 });

    setMsg("Trade proposal sent!"); loadTrades(); setSubmitting(false);
    setTimeout(() => setMsg(""), 4000);

        ...(trade.offered_players || []).filter(p => !p.startsWith("Pick:")).map(p => ({ player: p, from_team: trade.from_team, to_team: trade.to_team, season: 4, trade_id: trade.id })),

      for (const o of allPlayers) await sbInsertRosterOverride(o);
      if (onTradeAccepted) onTradeAccepted();
